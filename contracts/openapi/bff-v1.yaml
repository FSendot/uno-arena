        expectedSequenceNumber:
          type: integer
          format: int64
          minimum: 0
          description: Required for mutations of an existing room aggregate
        schemaVersion:
          type: integer
          enum: [1]
        payload:
          type: object
          additionalProperties: false
          properties:
            roomId:
              type: string
            cardId:
              type: string

    DrawCardCommand:
      type: object
      additionalProperties: false
      required: [commandId, type, schemaVersion, expectedSequenceNumber, payload]
      properties:
        commandId:
          type: string
          description: Idempotency key
        type:
          type: string
          enum: [DrawCard]
        expectedSequenceNumber:
          type: integer
          format: int64
          minimum: 0
          description: Required for mutations of an existing room aggregate
        schemaVersion:
          type: integer
          enum: [1]
        payload:
          type: object
          additionalProperties: false
          properties:
            roomId:
              type: string

    ChooseColorCommand:
      type: object
      additionalProperties: false
      required: [commandId, type, schemaVersion, expectedSequenceNumber, payload]
      properties:
        commandId:
          type: string
          description: Idempotency key
        type:
          type: string
          enum: [ChooseColor]
        expectedSequenceNumber:
          type: integer
          format: int64
          minimum: 0
          description: Required for mutations of an existing room aggregate
        schemaVersion:
          type: integer
          enum: [1]
        payload:
          type: object
          additionalProperties: false
          properties:
            roomId:
              type: string
            color:
              type: string
              enum: [red, yellow, green, blue]

    CallUnoCommand:
      type: object
      additionalProperties: false
