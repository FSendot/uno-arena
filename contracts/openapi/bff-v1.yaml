      properties:
        commandId:
          type: string
          description: Idempotency key
        type:
          type: string
          enum: [ReportMissingUno]
        expectedSequenceNumber:
          type: integer
          format: int64
          minimum: 0
          description: Required for mutations of an existing room aggregate
        schemaVersion:
          type: integer
          enum: [1]
        payload:
