openapi: 3.0.3
info:
  title: UnoArena Realtime Gateway / BFF
  version: 1.0.0
  description: |
    Sole external HTTP/SSE surface for UnoArena. Clients submit versioned command
    envelopes, fetch reconnect/projection snapshots, and subscribe to SSE streams.
    Microservices are not publicly reachable. For this implementation the repo-owned
    simple CLI is the sole client/test interface; a graphical UI is deferred and must
    continue to use only this BFF boundary. Rejected commands return `status=rejected`
    with a structured operational/security audit record only (never domain events or
    Game Integrity entries). Unknown or evicted `Last-Event-ID` values return HTTP 409
    `snapshot_required` so clients resync via the snapshot routes before resuming SSE.
servers:
  - url: http://localhost:8080
    description: Local compose BFF (gateway)
tags:
  - name: health
  - name: auth
  - name: commands
  - name: snapshots
  - name: streams
  - name: reads
paths:
  /health:
    get:
      tags: [health]
      summary: BFF health probe
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [health]
      summary: BFF readiness probe
      description: |
        Returns 200 only when the gateway is statically ready and required upstream
        `/ready` probes succeed. Not the same as `/health`.
      operationId: getReady
      responses:
        "200":
          description: Gateway is ready to accept traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Not ready (missing adapters, upstream /ready failure, or blocked mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/auth/register:
    post:
      tags: [auth]
      summary: Register a player (proxied to Identity)
      operationId: registerPlayer
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Identity upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/auth/login:
    post:
      tags: [auth]
      summary: Login and establish a single active session
      operationId: loginPlayer
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Identity upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/auth/whoami:
    get:
      tags: [auth]
      summary: Resolve the current session principal
      operationId: whoami
      security:
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhoamiResponse"
        "401":
          description: Missing or invalid session bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Identity upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/commands:
    post:
      tags: [commands]
      summary: Submit a versioned command envelope
      description: |
        Compact command entrypoint. `commandId` is the idempotency key.
        `expectedSequenceNumber` is required for mutations of an existing room aggregate.
        Domain rejection is HTTP 200 with `status=rejected` (not HTTP 409).
      operationId: submitCommand
      security:
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - $ref: "#/components/parameters/CommandIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandEnvelope"
      responses:
        "200":
          description: Command accepted or rejected (rejection is not a domain event)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          description: Missing or invalid session bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Upstream command dispatch or invalid upstream result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/rooms:
    get:
      tags: [reads]
      summary: Bounded public room list (proxied)
      description: |
        Canonical CLI `room list` / `play --casual` matchmaking read. Transparent Gateway proxy of
        Room Gameplay `GET /internal/v1/rooms/public-list` authenticated with the Gateway↔Room
        scoped service credential. Returns only public room summaries; never private rooms, hands,
        session data, invite material, Game Integrity data, or internal credentials.
        No player bearer is required. Default `status=waiting` (joinable); optional
        `waiting|locked|in_progress`. Opaque Room-owned HMAC cursor; page default 50 / hard max 100.
        Gateway validates query bounds and upstream shape; preserves Room 400/401 classifications
        with Gateway-owned safe error bodies; network/decode/malformed upstream map to 502.
      operationId: listPublicRooms
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [waiting, locked, in_progress]
            default: waiting
          description: Room lifecycle filter. Default waiting for joinable casual matchmaking.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque Room-owned live keyset cursor over stable roomId, bound to the status filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Bounded public room summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicRoomListPage"
        "400":
          description: Invalid status, limit, or cursor (Room classification preserved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Upstream service credential failure (should not reach public clients in healthy wiring)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Room upstream failure or malformed public list body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/rooms/{roomId}/commands:
    post:
      tags: [commands]
      summary: Submit a room-scoped command envelope
      description: |
        Domain rejection is HTTP 200 with `status=rejected` (not HTTP 409).
      operationId: submitRoomCommand
      security:
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - $ref: "#/components/parameters/CommandIdHeader"
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandEnvelope"
      responses:
        "200":
          description: Command outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          description: Missing or invalid session bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Upstream command dispatch or invalid upstream result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/rooms/{roomId}/snapshot:
    get:
      tags: [snapshots]
      summary: Player-private reconnect snapshot
      description: |
        Authoritative player reconnect snapshot after SSE `409 snapshot_required` or
        reconnect. Includes that player's private hand as runtime `Card` objects
        (`id`/`color`/`face`) when a game is active, public room/game facts, and open
        Uno window fields (`expiresAt`, `openingSequence`) when applicable. Requires an
        authenticated room member (or reconnect-eligible disconnected member).
      operationId: getPlayerRoomSnapshot
      security:
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player-private room snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerRoomSnapshot"
        "401":
          description: Missing or invalid session bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /v1/spectator/rooms/{roomId}/snapshot:
    get:
      tags: [snapshots]
      summary: Spectator-safe projection snapshot
      description: |
        Privacy-filtered spectator projection for initial load or resync after SSE
        `409 snapshot_required`. Admission is allowed while room status is `waiting`,
        `locked`, or `in_progress` subject to public/private authorization. Denied after
        terminal `RoomCompleted` or `RoomCancelled` (not after individual `GameCompleted`
        inside a best-of-three). Public rooms are anonymous-tolerant; private rooms need
        participant session, `X-Room-Invite`, or operator scope. When `Authorization` is
        present, an invalid bearer returns HTTP 401 (token is validated before admission).
      operationId: getSpectatorRoomSnapshot
      security:
        - {}
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - $ref: "#/components/parameters/RoomInviteHeader"
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spectator-safe room snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpectatorRoomSnapshot"
        "401":
          description: Authorization present but session bearer is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Spectator admission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /v1/streams/player:
    get:
      tags: [streams]
      summary: Player SSE feed
      operationId: playerStream
      security:
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
          description: Resume marker (event id). Unknown or evicted values yield 409 snapshot_required.
        - name: roomId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: |
            text/event-stream of player-safe room facts and control events.
            Wire uses SSE `id`/`event` fields; JSON `data` includes injected `schemaVersion`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"
        "400":
          description: Missing required roomId query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid session bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          $ref: "#/components/responses/SnapshotRequired"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Upstream identity/admission failure while opening the stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/streams/spectator:
    get:
      tags: [streams]
      summary: Spectator SSE feed (privacy-filtered)
      description: |
        Admission while room status is `waiting`, `locked`, or `in_progress`. Existing
        streams close on terminal `RoomCompleted` / `RoomCancelled`
        (not on individual `GameCompleted`). When `Authorization` is present, an invalid
        bearer returns HTTP 401 before admission is evaluated.
      operationId: spectatorStream
      security:
        - {}
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - $ref: "#/components/parameters/RoomInviteHeader"
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
          description: Resume marker (event id). Unknown or evicted values yield 409 snapshot_required.
        - name: roomId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: |
            Spectator-safe SSE stream. Wire uses SSE `id`/`event` fields; JSON `data`
            includes injected `schemaVersion`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"
        "400":
          description: Missing required roomId query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Authorization present but session bearer is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Admission denied (terminal room or unauthorized)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          $ref: "#/components/responses/SnapshotRequired"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Spectator admission upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/streams/control:
    get:
      tags: [streams]
      summary: Control-plane SSE (session invalidation, reconnect hints)
      operationId: controlStream
      security:
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
          description: Resume marker (event id). Unknown or evicted values yield 409 snapshot_required.
      responses:
        "200":
          description: |
            Control SSE stream. Wire uses SSE `id`/`event` fields; JSON `data`
            includes injected `schemaVersion`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"
        "401":
          description: Missing or invalid session bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          $ref: "#/components/responses/SnapshotRequired"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Upstream identity failure while opening the control stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/rankings/leaderboards:
    get:
      tags: [reads]
      summary: Public leaderboard read model (proxied)
      operationId: getLeaderboard
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - name: boardType
          in: query
          required: true
          schema:
            type: string
            enum: [casual_elo, tournament_placement]
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque Ranking-owned live keyset cursor over the last (rating, playerId) boundary. A projection version change does not invalidate it.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Leaderboard snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardPage"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Ranking upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/tournaments/{tournamentId}/bracket:
    get:
      tags: [reads]
      summary: Bounded tournament bracket read model (proxied)
      description: |
        Transparent Gateway proxy of Tournament Orchestration `GET /v1/tournaments/{tournamentId}/bracket`.
        Query parameters are forwarded unchanged. BFF is the sole public boundary and forwards only
        validated principals (as trusted `X-Player-Id` / `X-Operator-Scope`) plus the Tournament
        service credential.
        Authorization: anonymous-tolerant for public tournaments; private tournaments require a
        participant (registration status != withdrawn) or operator scope. When `Authorization` is
        present, an invalid bearer returns HTTP 401 before the upstream read.
        Response is a compact read model only (no full-bracket dump).
        Gateway preserves Tournament 400/401/403/404 classifications with Gateway-owned safe error bodies;
        other upstream/network/decode failures map to 502 without exposing upstream bodies.
      operationId: getTournamentBracket
      security:
        - {}
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: roundNumber
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque Tournament-owned live keyset cursor over stable (roundNumber, slotIndex) identity.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Compact bracket summary and one bounded slot page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BracketPage"
        "400":
          description: Invalid bracket query or cursor (Tournament classification preserved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Authorization present but invalid, or private tournament without principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Authenticated principal is not a participant or operator for a private tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Tournament upstream/network/decode failure (Gateway-owned safe body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/tournaments/{tournamentId}/standings:
    get:
      tags: [reads]
      summary: Bounded tournament standings read model (proxied)
      description: |
        Transparent Gateway proxy of Tournament Orchestration `GET /v1/tournaments/{tournamentId}/standings`.
        Compact projection only: phase, registeredCount, currentRound, and ordered finalStandings (max 10).
        finalStandings is empty until a final-round recorded result exists. No pagination.
        Authorization: anonymous-tolerant for public standings; private tournaments require a
        participant (registration status != withdrawn) or operator scope. When `Authorization` is
        present, an invalid bearer returns HTTP 401 before the upstream read.
        Gateway preserves Tournament 401/403/404 classifications with Gateway-owned safe error bodies;
        Tournament store/malformed failures and other upstream/network/decode failures map to 502
        without exposing upstream bodies.
      operationId: getTournamentStandings
      security:
        - {}
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bounded tournament standings projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentStandings"
        "401":
          description: Authorization present but invalid, or private tournament without principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Authenticated principal is not a participant or operator for a private tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Tournament upstream/network/decode failure (Gateway-owned safe body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/tournaments/{tournamentId}/players/{playerId}/assignment:
    get:
      tags: [reads]
      summary: Bounded player room-slot assignment (proxied)
      description: |
        Transparent Gateway proxy of Tournament Orchestration
        `GET /v1/tournaments/{tournamentId}/players/{playerId}/assignment`.
        Returns the caller's latest-round slot mapping (indexed; never scans seeded_player_ids arrays).
        `assignment` may be null when the player is registered but the current next round is not yet
        seeded/provisioned; `roomId` may be omitted until the slot is assigned a room.
        Requires bearer authentication. Requested `playerId` must equal the validated principal unless
        the principal has operator scope. Gateway forwards only trusted principal fields plus the
        Tournament service credential.
      operationId: getTournamentPlayerAssignment
      security:
        - SessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - $ref: "#/components/parameters/SessionTokenHeader"
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bounded assignment projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentPlayerAssignment"
        "401":
          description: Missing or invalid session bearer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Authenticated principal may not read this player's assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Tournament or player registration not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Tournament upstream/network/decode failure (Gateway-owned safe body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/analytics/public:
    get:
      tags: [reads]
      summary: Public analytics read model (proxied)
      operationId: getPublicAnalytics
      parameters:
        - $ref: "#/components/parameters/CorrelationIdHeader"
      responses:
        "200":
          description: Derived public analytics
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "429":
          $ref: "#/components/responses/Error"
        "502":
          description: Analytics upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

components:
  securitySchemes:
    SessionBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
      description: |
        Identity-issued session token via BFF login. Required for player/command/control
        routes. Optional on spectator routes; when present, invalid tokens yield 401.

  parameters:
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    CommandIdHeader:
      name: X-Command-Id
      in: header
      required: false
      schema:
        type: string
    SessionTokenHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
      description: Bearer session token issued by Identity via BFF login
    RoomInviteHeader:
      name: X-Room-Invite
      in: header
      required: false
      schema:
        type: string
      description: Invite capability token for private-room spectator admission

  responses:
    Error:
      description: Structured error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    SnapshotRequired:
      description: |
        Last-Event-ID is unknown or evicted from the resume bound. Client must fetch
        the matching snapshot route and resume SSE without claiming false continuity.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SnapshotRequiredError"
          example:
            code: snapshot_required
            message: Last-Event-ID unknown or evicted; resync snapshot required
            correlationId: corr_01HX...

  schemas:
    PublicRoomListPage:
      type: object
      additionalProperties: false
      required: [schemaVersion, rooms]
      properties:
        schemaVersion:
          type: integer
          enum: [1]
        rooms:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/PublicRoomSummary"
        nextCursor:
          type: string
          description: Present only when another page exists (one-row lookahead).
    PublicRoomSummary:
      type: object
      additionalProperties: false
      required: [roomId, status, visibility, maxSeats, currentPlayers, hostId, roomType]
      properties:
        roomId:
          type: string
        status:
          type: string
          enum: [waiting, locked, in_progress]
        visibility:
          type: string
          enum: [public]
        maxSeats:
          type: integer
          minimum: 2
          maximum: 10
        currentPlayers:
          type: integer
          minimum: 0
        hostId:
          type: string
          description: Host player id only; other roster identities are never listed.
        roomType:
          type: string
          enum: [ad_hoc, tournament]
        tournamentId:
          type: string
          description: Present only for public tournament rooms when relevant.
    LeaderboardPage:
      type: object
      additionalProperties: false
      required: [boardType, projectionVersion, generatedAt, entries]
      properties:
        boardType:
          type: string
          enum: [casual_elo, tournament_placement]
        projectionVersion:
          type: integer
          format: int64
          minimum: 0
          description: Version observed for this page; a later page may report a newer version.
        generatedAt:
          type: string
          format: date-time
        entries:
          type: array
          maxItems: 500
          items:
            type: object
            additionalProperties: false
            required: [playerId, rating, rank]
            properties:
              playerId:
                type: string
              rating:
                type: integer
              rank:
                type: integer
                minimum: 1
        nextCursor:
          type: string
          description: Opaque live-keyset continuation cursor; absent on the final page.

    BracketPage:
      type: object
      additionalProperties: false
      required: [tournamentId, projectionVersion, generatedAt, summary, slots]
      properties:
        tournamentId:
          type: string
        projectionVersion:
          type: integer
          format: int64
          minimum: 0
          description: Version observed for this page; slot state may advance before a later page.
        generatedAt:
          type: string
          format: date-time
        summary:
          $ref: "#/components/schemas/BracketSummary"
        slots:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/BracketSlot"
        nextCursor:
          type: string
          description: Opaque live-keyset continuation cursor; absent on the final page.

    BracketSummary:
      type: object
      additionalProperties: false
      required: [phase, capacity, registeredCount, currentRound, rounds]
      properties:
        phase:
          type: string
        capacity:
          type: integer
          minimum: 0
        registeredCount:
          type: integer
          minimum: 0
        currentRound:
          type: integer
          minimum: 0
        rounds:
          type: array
          items:
            $ref: "#/components/schemas/BracketRoundSummary"

    BracketRoundSummary:
      type: object
      additionalProperties: false
      required: [roundNumber, status, isFinal, slotCount, completed, batchCount]
      properties:
        roundNumber:
          type: integer
          minimum: 1
        status:
          type: string
        isFinal:
          type: boolean
        slotCount:
          type: integer
          minimum: 0
        completed:
          type: boolean
        batchCount:
          type: integer
          minimum: 0

    BracketSlot:
      type: object
      additionalProperties: false
      required: [roundNumber, slotIndex, slotId, status, seededPlayerIds]
      properties:
        roundNumber:
          type: integer
          minimum: 1
        slotIndex:
          type: integer
          minimum: 0
        slotId:
          type: string
        status:
          type: string
        seededPlayerIds:
          type: array
          maxItems: 10
          items:
            type: string
        roomId:
          type: string
        batchId:
          type: string
        advancingPlayerIds:
          type: array
          maxItems: 10
          items:
            type: string
        completionVersion:
          type: integer
          format: int64
          minimum: 0
        quarantineReason:
          type: string

    TournamentStandings:
      type: object
      additionalProperties: false
      required:
        - tournamentId
        - projectionVersion
        - generatedAt
        - phase
        - registeredCount
        - currentRound
        - finalStandings
      properties:
        tournamentId:
          type: string
        projectionVersion:
          type: integer
          format: int64
          minimum: 0
        generatedAt:
          type: string
          format: date-time
        phase:
          type: string
        registeredCount:
          type: integer
          minimum: 0
        currentRound:
          type: integer
          minimum: 0
        finalStandings:
          type: array
          maxItems: 10
          description: |
            Ordered final-room player IDs from Tournament-owned recorded ranked_result.
            Empty until a final-round result is recorded. No championId; first entry is place 1.
          items:
            type: string

    TournamentPlayerAssignment:
      type: object
      additionalProperties: false
      required:
        - tournamentId
        - playerId
        - visibility
        - phase
        - registrationStatus
        - currentRound
        - assignment
      properties:
        tournamentId:
          type: string
        playerId:
          type: string
        visibility:
          type: string
          enum: [public, private]
        phase:
          type: string
        registrationStatus:
          type: string
          enum: [registered, withdrawn, eliminated, advanced_final]
        currentRound:
          type: integer
          minimum: 0
        assignment:
          nullable: true
          description: |
            Latest-round slot mapping from the normalized player index.
            Null when registered but the player's next round is not yet seeded.
          allOf:
            - $ref: "#/components/schemas/TournamentSlotAssignment"
        projectionVersion:
          type: integer
          format: int64
          minimum: 0
        generatedAt:
          type: string
          format: date-time

    TournamentSlotAssignment:
      type: object
      additionalProperties: false
      required: [roundNumber, slotId, slotStatus]
      properties:
        roundNumber:
          type: integer
          minimum: 1
        slotId:
          type: string
        roomId:
          type: string
          description: Present only after the slot has an assigned room; omitted when still pending provisioning.
        slotStatus:
          type: string

    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: gateway

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    RegisterResponse:
      type: object
      required: [status, username]
      properties:
        status:
          type: string
        username:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [sessionId, playerId, token]
      properties:
        sessionId:
          type: string
        playerId:
          type: string
        token:
          type: string

    WhoamiResponse:
      type: object
      required: [playerId, sessionId, username]
      properties:
        playerId:
          type: string
        sessionId:
          type: string
        username:
          type: string

    CommandEnvelope:
      description: |
        Discriminated command envelope. `type` selects exactly one catalog variant;
        each variant constrains `payload` and whether `expectedSequenceNumber` is
        required (existing-room mutations) or prohibited (CreateRoom and tournament
        commands). Gateway accepts only these envelope fields.
      oneOf:
        - $ref: "#/components/schemas/CreateRoomCommand"
        - $ref: "#/components/schemas/JoinRoomCommand"
        - $ref: "#/components/schemas/LeaveRoomCommand"
        - $ref: "#/components/schemas/LockRoomCommand"
        - $ref: "#/components/schemas/StartMatchCommand"
        - $ref: "#/components/schemas/CancelRoomCommand"
        - $ref: "#/components/schemas/PlayCardCommand"
        - $ref: "#/components/schemas/DrawCardCommand"
        - $ref: "#/components/schemas/ChooseColorCommand"
        - $ref: "#/components/schemas/CallUnoCommand"
        - $ref: "#/components/schemas/ReportMissingUnoCommand"
        - $ref: "#/components/schemas/ReconnectToRoomCommand"
        - $ref: "#/components/schemas/CreateTournamentCommand"
        - $ref: "#/components/schemas/RegisterPlayerCommand"
        - $ref: "#/components/schemas/CloseRegistrationCommand"
      discriminator:
        propertyName: type
        mapping:
          CreateRoom: "#/components/schemas/CreateRoomCommand"
          JoinRoom: "#/components/schemas/JoinRoomCommand"
          LeaveRoom: "#/components/schemas/LeaveRoomCommand"
          LockRoom: "#/components/schemas/LockRoomCommand"
          StartMatch: "#/components/schemas/StartMatchCommand"
          CancelRoom: "#/components/schemas/CancelRoomCommand"
          PlayCard: "#/components/schemas/PlayCardCommand"
          DrawCard: "#/components/schemas/DrawCardCommand"
          ChooseColor: "#/components/schemas/ChooseColorCommand"
          CallUno: "#/components/schemas/CallUnoCommand"
          ReportMissingUno: "#/components/schemas/ReportMissingUnoCommand"
          ReconnectToRoom: "#/components/schemas/ReconnectToRoomCommand"
          CreateTournament: "#/components/schemas/CreateTournamentCommand"
          RegisterPlayer: "#/components/schemas/RegisterPlayerCommand"
          CloseRegistration: "#/components/schemas/CloseRegistrationCommand"

    CreateRoomCommand:
      type: object
      additionalProperties: false
      required: [commandId, type, schemaVersion, payload]
      properties:
        commandId:
          type: string
          description: Idempotency key
        type:
          type: string
          enum: [CreateRoom]
        schemaVersion:
          type: integer
          enum: [1]
        payload:
          type: object
          additionalProperties: false
          properties:
            roomId:
              type: string
            visibility:
              type: string
              enum: [public, private]
            maxSeats:
              description: |
                Optional seat capacity. Omitted or nonpositive values default to 10
                in domain handling. Explicit positive values must be integers in
                2..10 inclusive; 1 and values greater than 10 are rejected.
              anyOf:
                - type: integer
                  maximum: 0
                  description: Nonpositive values default to 10
                - type: integer
                  minimum: 2
                  maximum: 10

    JoinRoomCommand:
      type: object
      additionalProperties: false
      required: [commandId, type, schemaVersion, expectedSequenceNumber, payload]
      properties:
        commandId:
          type: string
          description: Idempotency key
        type:
          type: string
          enum: [JoinRoom]
        expectedSequenceNumber:
          type: integer
          format: int64
          minimum: 0
          description: Required for mutations of an existing room aggregate
        schemaVersion:
          type: integer
          enum: [1]
        payload:
          type: object
          additionalProperties: false
          properties:
            roomId:
              type: string

    LeaveRoomCommand:
      type: object
      additionalProperties: false
      required: [commandId, type, schemaVersion, expectedSequenceNumber, payload]
      properties:
        commandId:
          type: string
          description: Idempotency key
        type:
          type: string
          enum: [LeaveRoom]
        expectedSequenceNumber:
          type: integer
          format: int64
          minimum: 0
          description: Required for mutations of an existing room aggregate
        schemaVersion:
          type: integer
          enum: [1]
        payload:
          type: object
          additionalProperties: false
          properties:
            roomId:
              type: string

    LockRoomCommand:
      type: object
      additionalProperties: false
      required: [commandId, type, schemaVersion, expectedSequenceNumber, payload]
      properties:
        commandId:
          type: string
          description: Idempotency key
        type:
          type: string
          enum: [LockRoom]
        expectedSequenceNumber:
          type: integer
          format: int64
          minimum: 0
          description: Required for mutations of an existing room aggregate
        schemaVersion:
          type: integer
          enum: [1]
        payload:
          type: object
