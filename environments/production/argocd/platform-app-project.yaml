apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: uno-arena-production-platform
  namespace: argocd
spec:
  description: In-cluster production control-plane releases; datastores remain external.
  sourceRepos:
    - https://gitlab.example.invalid/api/v4/projects/PROJECT_ID/packages/helm/stable
  destinations:
    - {server: "https://kubernetes.default.svc", namespace: uno-arena}
    - {server: "https://kubernetes.default.svc", namespace: observability}
  orphanedResources: {warn: true}
  namespaceResourceWhitelist:
    - {group: "", kind: ConfigMap}
    - {group: "", kind: PersistentVolumeClaim}
    - {group: "", kind: Secret}
    - {group: "", kind: Service}
    - {group: "", kind: ServiceAccount}
    - {group: apps, kind: DaemonSet}
    - {group: apps, kind: Deployment}
    - {group: batch, kind: Job}
    - {group: external-secrets.io, kind: ExternalSecret}
    - {group: networking.k8s.io, kind: NetworkPolicy}
    - {group: rbac.authorization.k8s.io, kind: Role}
    - {group: rbac.authorization.k8s.io, kind: RoleBinding}
    - {group: security.istio.io, kind: AuthorizationPolicy}
    - {group: security.istio.io, kind: PeerAuthentication}
  clusterResourceWhitelist:
    - {group: rbac.authorization.k8s.io, kind: ClusterRole}
    - {group: rbac.authorization.k8s.io, kind: ClusterRoleBinding}
