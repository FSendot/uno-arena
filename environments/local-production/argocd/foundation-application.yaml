apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uno-arena-local-production-foundations
  namespace: argocd
spec:
  project: uno-arena-foundations
  source:
    repoURL: https://gitlab.example.invalid/GROUP/PROJECT.git
    targetRevision: main
    path: infrastructure/local-production/gitops/foundation
    directory:
      include: desired.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[]?.failurePolicy
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - .webhooks[]?.failurePolicy
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
