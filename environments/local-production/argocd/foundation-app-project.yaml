apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: uno-arena-foundations
  namespace: argocd
spec:
  description: Pinned local cluster operators and declarative edge/mesh policy; pruning is disabled.
  sourceRepos:
    - https://gitlab.example.invalid/GROUP/PROJECT.git
  destinations:
    - {server: "https://kubernetes.default.svc", namespace: argocd}
    - {server: "https://kubernetes.default.svc", namespace: cert-manager}
    - {server: "https://kubernetes.default.svc", namespace: external-secrets}
    - {server: "https://kubernetes.default.svc", namespace: istio-system}
    - {server: "https://kubernetes.default.svc", namespace: kube-system}
    - {server: "https://kubernetes.default.svc", namespace: observability}
    - {server: "https://kubernetes.default.svc", namespace: secret-seed}
    - {server: "https://kubernetes.default.svc", namespace: uno-arena}
  orphanedResources: {warn: true}
  namespaceResourceWhitelist:
    - {group: "", kind: ConfigMap}
    - {group: "", kind: Endpoints}
    - {group: "", kind: Namespace}
    - {group: "", kind: Secret}
    - {group: "", kind: Service}
    - {group: "", kind: ServiceAccount}
    - {group: admissionregistration.k8s.io, kind: MutatingWebhookConfiguration}
    - {group: admissionregistration.k8s.io, kind: ValidatingWebhookConfiguration}
    - {group: apps, kind: DaemonSet}
    - {group: apps, kind: Deployment}
    - {group: apps, kind: StatefulSet}
    - {group: autoscaling, kind: HorizontalPodAutoscaler}
    - {group: batch, kind: Job}
    - {group: cert-manager.io, kind: Certificate}
    - {group: cert-manager.io, kind: Issuer}
    - {group: coordination.k8s.io, kind: Lease}
    - {group: external-secrets.io, kind: ClusterSecretStore}
    - {group: gateway.networking.k8s.io, kind: Gateway}
    - {group: gateway.networking.k8s.io, kind: HTTPRoute}
    - {group: networking.istio.io, kind: GatewayClass}
    - {group: networking.k8s.io, kind: NetworkPolicy}
    - {group: policy, kind: PodDisruptionBudget}
    - {group: rbac.authorization.k8s.io, kind: Role}
    - {group: rbac.authorization.k8s.io, kind: RoleBinding}
    - {group: security.istio.io, kind: AuthorizationPolicy}
    - {group: security.istio.io, kind: PeerAuthentication}
  clusterResourceWhitelist:
    - {group: "", kind: Namespace}
    - {group: admissionregistration.k8s.io, kind: MutatingWebhookConfiguration}
    - {group: admissionregistration.k8s.io, kind: ValidatingAdmissionPolicy}
    - {group: admissionregistration.k8s.io, kind: ValidatingAdmissionPolicyBinding}
    - {group: admissionregistration.k8s.io, kind: ValidatingWebhookConfiguration}
    - {group: apiextensions.k8s.io, kind: CustomResourceDefinition}
    - {group: apiregistration.k8s.io, kind: APIService}
    - {group: cert-manager.io, kind: ClusterIssuer}
    - {group: external-secrets.io, kind: ClusterSecretStore}
    - {group: gateway.networking.k8s.io, kind: GatewayClass}
    - {group: rbac.authorization.k8s.io, kind: ClusterRole}
    - {group: rbac.authorization.k8s.io, kind: ClusterRoleBinding}
    - {group: scheduling.k8s.io, kind: PriorityClass}
    - {group: storage.k8s.io, kind: CSIDriver}
