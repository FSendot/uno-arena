apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uno-arena-local-production-root
  namespace: argocd
spec:
  project: uno-arena-bootstrap
  source:
    repoURL: {{ required "gitRepoURL is required" .Values.gitRepoURL | quote }}
    targetRevision: {{ .Values.revision | quote }}
    path: environments/local-production/argocd
    helm:
      releaseName: uno-arena-local-production-root
      values: |
        gitRepoURL: {{ .Values.gitRepoURL | quote }}
        helmRepoURL: {{ .Values.helmRepoURL | quote }}
        revision: {{ .Values.revision | quote }}
        foundationPath: {{ .Values.foundationPath | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=false
      - ServerSideApply=true
