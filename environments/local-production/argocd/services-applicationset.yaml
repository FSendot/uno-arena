apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: uno-arena-local-production-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://gitlab.example.invalid/GROUP/PROJECT.git
        revision: main
        files:
          # Only promotion-created released copies are watched. Disabled bootstrap
          # placeholders under services/*.yaml can never generate Applications.
          - path: environments/local-production/services/enabled/*.yaml
  syncPolicy:
    preserveResourcesOnDeletion: true
  template:
    metadata:
      name: '{{.application}}'
      namespace: argocd
      annotations:
        unoarena.io/inventory-status: '{{.status}}'
    spec:
      project: '{{.project}}'
      sources:
        - repoURL: '{{.chart.repository}}'
          chart: '{{.chart.name}}'
          targetRevision: '{{.chart.version}}'
          helm:
            releaseName: '{{.component}}'
            valueFiles:
              - '$values/services/{{.component}}/helm/{{.component}}/values.production.yaml'
              - '$values/services/{{.component}}/helm/{{.component}}/values.local-production.yaml'
            values: |
              image:
                repository: '{{.image.repository}}'
                digest: '{{.image.digest}}'
        - repoURL: '{{.values.repository}}'
          targetRevision: '{{.values.revision}}'
          ref: values
      destination:
        server: '{{.destination.server}}'
        namespace: '{{.destination.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ApplyOutOfSyncOnly=true
          - CreateNamespace=false
          - FailOnSharedResource=true
          - PruneLast=true
