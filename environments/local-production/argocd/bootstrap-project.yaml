apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: uno-arena-bootstrap
  namespace: argocd
spec:
  description: Owns only the repository-backed local-production root graph.
  sourceRepos:
    - https://gitlab.example.invalid/GROUP/PROJECT.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
  namespaceResourceWhitelist:
    - {group: argoproj.io, kind: Application}
    - {group: argoproj.io, kind: ApplicationSet}
    - {group: argoproj.io, kind: AppProject}
  clusterResourceWhitelist: []
  orphanedResources: {warn: true}
