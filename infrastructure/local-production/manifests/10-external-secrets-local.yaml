apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-kubernetes-secret-reader
  namespace: external-secrets
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-secrets-read-seed
  namespace: secret-seed
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-read-seed
  namespace: secret-seed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: external-secrets-read-seed
subjects:
  - kind: ServiceAccount
    name: local-kubernetes-secret-reader
    namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: local-kubernetes
spec:
  provider:
    kubernetes:
      remoteNamespace: secret-seed
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: local-kubernetes-secret-reader
          namespace: external-secrets
