apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: uno-arena-local-tls
  namespace: uno-arena
spec:
  secretName: uno-arena-local-tls
  dnsNames:
    - uno-arena.local
  issuerRef:
    name: uno-arena-local-ca
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-local-tls
  namespace: argocd
spec:
  secretName: argocd-server-tls
  dnsNames:
    - argocd-server
    - argocd-server.argocd.svc
    - argocd-server.argocd.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: uno-arena-local-ca
    kind: ClusterIssuer
