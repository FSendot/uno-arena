# Strict transport plus workload-scoped L4 allowlists. Multiple ALLOW policies
# for one workload are additive; the metrics policy therefore adds Prometheus
# without broadening application port 8080.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: uno-arena
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: observability
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: application-metrics-from-prometheus
  namespace: uno-arena
spec:
  selector:
    matchLabels:
      unoarena.io/metrics-exposed: "true"
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/observability/sa/prometheus
      to:
        - operation:
            ports: ["9090"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: gateway-callers
  namespace: uno-arena
spec:
  selector:
    matchLabels:
      app: gateway
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/uno-arena/sa/uno-arena-gateway-istio
              - cluster.local/ns/uno-arena/sa/room-gameplay-router
              - cluster.local/ns/uno-arena/sa/room-gameplay-runtime
      to:
        - operation:
            ports: ["8080"]
---
