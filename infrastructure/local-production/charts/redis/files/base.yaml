# Single-replica local-production Redis. AOF is retained on a dedicated PVC;
# Redis remains a rebuildable projection rather than an authoritative store.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: uno-arena
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: uno-arena
    spec:
      serviceAccountName: redis
      automountServiceAccountToken: false
      # Exec probes are reparented to the pod sandbox, whose pause process reaps
      # them. Redis itself does not reap orphaned probe processes when it is PID 1.
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: {{ .Values.image.repository }}@{{ required "image.digest is required" .Values.image.digest }}
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --dir
            - /data
            - --save
            - ""
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --appenddirname
            - appendonlydir
            - --maxmemory
            - {{ .Values.memory.maxmemory | quote }}
            - --maxmemory-policy
            - {{ .Values.memory.maxmemoryPolicy | quote }}
            - --shutdown-on-sigterm
            - default
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              # PONG required: LOADING during AOF replay must fail readiness.
              command: ["/bin/sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 2
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
