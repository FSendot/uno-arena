apiVersion: v1
kind: ServiceAccount
metadata: {name: minio, namespace: observability}
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: observability
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storageClassName }}
  resources:
    requests: {storage: {{ .Values.storage }}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: {matchLabels: {app.kubernetes.io/name: minio}}
  template:
    metadata: {labels: {app.kubernetes.io/name: minio}}
    spec:
      serviceAccountName: minio
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: minio
          image: {{ .Values.image.repository }}@{{ required "image.digest is required" .Values.image.digest }}
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - {name: MINIO_ROOT_USER, valueFrom: {secretKeyRef: {name: minio-observability, key: access-key-id}}}
            - {name: MINIO_ROOT_PASSWORD, valueFrom: {secretKeyRef: {name: minio-observability, key: secret-access-key}}}
            - {name: GOMEMLIMIT, value: 256MiB}
          ports:
            - {name: api, containerPort: 9000}
            - {name: console, containerPort: 9001}
          readinessProbe: {httpGet: {path: /minio/health/ready, port: api}, initialDelaySeconds: 5, timeoutSeconds: 10}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}, runAsUser: 1000, runAsGroup: 1000}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
          volumeMounts: [{name: data, mountPath: /data}]
      volumes: [{name: data, persistentVolumeClaim: {claimName: minio-data}}]
---
apiVersion: v1
kind: Service
metadata: {name: minio, namespace: observability}
spec:
  type: ClusterIP
  selector: {app.kubernetes.io/name: minio}
  ports:
    - {name: api, port: 9000, targetPort: api}
