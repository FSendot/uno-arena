{{- if .Values.productionObservabilitySecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.productionObservabilitySecrets.s3Target }}
  namespace: observability
  annotations: {argocd.argoproj.io/sync-wave: "-40"}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef: {kind: ClusterSecretStore, name: {{ $store }}}
  target: {name: {{ .Values.productionObservabilitySecrets.s3Target }}, creationPolicy: Owner}
  data:
    - {secretKey: endpoint, remoteRef: {key: {{ $source }}, property: observability-s3-endpoint}}
    - {secretKey: region, remoteRef: {key: {{ $source }}, property: observability-s3-region}}
    - {secretKey: access-key-id, remoteRef: {key: {{ $source }}, property: observability-s3-access-key-id}}
    - {secretKey: secret-access-key, remoteRef: {key: {{ $source }}, property: observability-s3-secret-access-key}}
    - {secretKey: loki-bucket, remoteRef: {key: {{ $source }}, property: observability-loki-bucket}}
    - {secretKey: tempo-bucket, remoteRef: {key: {{ $source }}, property: observability-tempo-bucket}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.productionObservabilitySecrets.grafanaTarget }}
  namespace: observability
  annotations: {argocd.argoproj.io/sync-wave: "-40"}
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef: {kind: ClusterSecretStore, name: {{ $store }}}
  target: {name: {{ .Values.productionObservabilitySecrets.grafanaTarget }}, creationPolicy: Owner}
  data:
    - {secretKey: admin-user, remoteRef: {key: {{ $source }}, property: grafana-admin-user}}
    - {secretKey: admin-password, remoteRef: {key: {{ $source }}, property: grafana-admin-password}}
{{- end }}
