{{- range $target, $mapping := $targets }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $target }}
  namespace: uno-arena
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $store }}
  target:
    name: {{ $target }}
    creationPolicy: Owner
  data:
  {{- range $targetKey, $remoteKey := $mapping }}
    - secretKey: {{ $targetKey }}
      remoteRef:
        key: {{ $source }}
        property: {{ $remoteKey }}
  {{- end }}
---
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry
  namespace: uno-arena
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef: {kind: ClusterSecretStore, name: {{ $store }}}
  target:
    name: gitlab-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef: {key: {{ $source }}, property: gitlab-registry-dockerconfigjson}
{{- if .Values.localPlatformSecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-observability
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef: {kind: ClusterSecretStore, name: {{ $store }}}
  target: {name: minio-observability, creationPolicy: Owner}
  data:
    - secretKey: access-key-id
      remoteRef: {key: {{ $source }}, property: minio-access-key-id}
    - secretKey: secret-access-key
      remoteRef: {key: {{ $source }}, property: minio-secret-access-key}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uno-arena-local-observability
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef: {kind: ClusterSecretStore, name: {{ $store }}}
  target: {name: uno-arena-local-observability, creationPolicy: Owner}
  data:
    - secretKey: admin-user
      remoteRef: {key: {{ $source }}, property: grafana-admin-user}
    - secretKey: admin-password
      remoteRef: {key: {{ $source }}, property: grafana-admin-password}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
