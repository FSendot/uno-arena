# Debezium Server 3.6 — Room realtime outbox → Redis Streams (DB 2, extended format).
# Separate from Kafka Connect. Does not claim live Postgres→Redis delivery verification.
# Workload pins the exact quay.io multi-architecture index; imagePullPolicy Never so kubelet
# never registry-pulls — make kind-load-debezium-server (node-native crictl pull)
# is mandatory before pods can start. kind load is not used for this image.
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-server-room-realtime-config
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: debezium-server-room-realtime
    app.kubernetes.io/part-of: uno-arena
    app.kubernetes.io/component: debezium-server
    uno-arena.local/non-production: "true"
    uno-arena.local/cdc-pipeline: room-realtime-redis
data:
  # Workload image = exact SOURCE_IMAGE_REF. Loader: docker exec + crictl pull on kind node.
  SOURCE_IMAGE_REF: quay.io/debezium/server:3.6.0.Final@sha256:accbc0d52bcd53f1fe745c2c4957eea8c39be9fd000fb9c20b7d33cbd6c2bfc2
  IMAGE_VERSION: 3.6.0.Final
  MULTIARCH_INDEX_DIGEST: sha256:accbc0d52bcd53f1fe745c2c4957eea8c39be9fd000fb9c20b7d33cbd6c2bfc2
  application.properties: |
    # Quarkus / health
    quarkus.http.port=8080
    quarkus.log.console.json=false

    # Redis Streams sink — Gateway player feed DB index 2, extended format
    debezium.sink.type=redis
    debezium.sink.redis.address=redis.uno-arena.svc.cluster.local:6379
    debezium.sink.redis.db.index=2
    debezium.sink.redis.message.format=extended
    debezium.sink.redis.cluster.enabled=false

    # Durable Redis offsets — unique key (must not collide with Connect / other pipelines).
    # Offset Redis db.index is unsupported; rely on the unique key only.
    debezium.source.offset.storage=io.debezium.storage.redis.offset.RedisOffsetBackingStore
    debezium.source.offset.storage.redis.address=redis.uno-arena.svc.cluster.local:6379
    debezium.source.offset.storage.redis.key=metadata:debezium:room-realtime:offsets
    debezium.source.offset.flush.interval.ms=1000

    # PostgreSQL source — Room context DB, realtime CDC identity (password via env).
    # No explicit schema-history store: insert-only outbox with snapshot.mode=no_data.
    debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
    debezium.source.database.hostname=postgres-room-gameplay.uno-arena.svc.cluster.local
    debezium.source.database.port=5432
    debezium.source.database.user=room_cdc_realtime
    debezium.source.database.dbname=room_gameplay
    debezium.source.topic.prefix=room.realtime
    debezium.source.plugin.name=pgoutput
    debezium.source.slot.name=debezium_server_room_realtime
    debezium.source.publication.name=room_cdc_realtime_outbox
    debezium.source.publication.autocreate.mode=disabled
    debezium.source.table.include.list=public.realtime_outbox_events
    debezium.source.tombstones.on.delete=false
    # Insert-only outbox; disposable local data — streaming only, no historical snapshot.
    debezium.source.snapshot.mode=no_data

    # Official Debezium Server format properties (not source.* converter aliases).
    debezium.format.key=json
    debezium.format.key.schemas.enable=false
    debezium.format.value=json
    debezium.format.value.schemas.enable=false
    debezium.format.header=json
    debezium.format.header.schemas.enable=false

    # Outbox Event Router — route target_stream column to physical Redis stream name.
    # Default routed payload stays available as "payload"; additional.placement is
    # metadata aliases only (do not re-place the payload column).
    debezium.transforms=outbox
    debezium.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
    debezium.transforms.outbox.table.field.event.id=event_id
    debezium.transforms.outbox.table.field.event.key=partition_key
    debezium.transforms.outbox.table.field.event.payload=payload
    debezium.transforms.outbox.table.expand.json.payload=true
    debezium.transforms.outbox.route.by.field=target_stream
    # SmallRye/MicroProfile treats ${...} as a config expression. Property-file
    # sources need \\${...} so the resolved value is the literal Outbox token
    # ${routedByValue} (Connect JSON templates keep the bare token — no Quarkus).
    debezium.transforms.outbox.route.topic.replacement=\\${routedByValue}
    debezium.transforms.outbox.table.field.additional.missing=ignore
    debezium.transforms.outbox.table.fields.additional.placement=event_id:envelope:eventId,event_type:envelope:event,schema_version:envelope:schemaVersion,sequence_number:envelope:sequence,player_id:envelope:playerId,session_id:envelope:sessionId,traceparent:envelope:traceparent,tracestate:envelope:tracestate
---
apiVersion: v1
kind: Service
metadata:
  name: debezium-server-room-realtime
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: debezium-server-room-realtime
    app.kubernetes.io/part-of: uno-arena
    app.kubernetes.io/component: debezium-server
    uno-arena.local/non-production: "true"
    uno-arena.local/cdc-pipeline: room-realtime-redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: debezium-server-room-realtime
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-server-room-realtime
  namespace: uno-arena
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: debezium-server-room-realtime
    app.kubernetes.io/part-of: uno-arena
    app.kubernetes.io/component: debezium-server
    uno-arena.local/non-production: "true"
    uno-arena.local/cdc-pipeline: room-realtime-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: debezium-server-room-realtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: debezium-server-room-realtime
        app.kubernetes.io/part-of: uno-arena
        app.kubernetes.io/component: debezium-server
        uno-arena.local/non-production: "true"
        uno-arena.local/cdc-pipeline: room-realtime-redis
    spec:
      serviceAccountName: debezium-server
      automountServiceAccountToken: false
      # Avoid Service-link env vars colliding with Quarkus/Debezium config keys.
      enableServiceLinks: false
      containers:
        - name: debezium-server
          # Exact quay multiarch index; Never = node must already hold its resolved child.
          image: {{ .Values.image.repository }}@{{ required "image.digest is required" .Values.image.digest }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # MicroProfile maps DEBEZIUM_SOURCE_DATABASE_PASSWORD → debezium.source.database.password
            - name: DEBEZIUM_SOURCE_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: platform-credentials
                  key: room-cdc-realtime-user
            - name: DEBEZIUM_SOURCE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-credentials
                  key: room-cdc-realtime-password
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx256m"
          volumeMounts:
            - name: config
              # Preserve image-owned files such as debezium-jmx-config.yaml.
              mountPath: /debezium/config/application.properties
              subPath: application.properties
              readOnly: true
          startupProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: config
          configMap:
            name: debezium-server-room-realtime-config
            items:
              - key: application.properties
                path: application.properties
