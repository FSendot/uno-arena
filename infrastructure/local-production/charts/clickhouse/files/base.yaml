# Retained single-node ClickHouse for local production. Schema uses bootstrap Job.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-kind-memory
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
data:
  99-kind-memory.xml: |
    <clickhouse>
      <max_server_memory_usage>805306368</max_server_memory_usage>
      <mark_cache_size>67108864</mark_cache_size>
      <uncompressed_cache_size>33554432</uncompressed_cache_size>
    </clickhouse>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: uno-arena
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: uno-arena
        uno-arena.local/context: analytics
    spec:
      serviceAccountName: clickhouse
      automountServiceAccountToken: false
      containers:
        - name: clickhouse
          image: {{ .Values.image.repository }}@{{ required "image.digest is required" .Values.image.digest }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: analytics
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: platform-credentials
                  key: clickhouse-admin-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-credentials
                  key: clickhouse-admin-password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: memory-config
              mountPath: /etc/clickhouse-server/config.d/99-kind-memory.xml
              subPath: 99-kind-memory.xml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1024Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: memory-config
          configMap:
            name: clickhouse-kind-memory
