# Retained single-node ClickHouse for local production. Schema uses bootstrap Job.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-kind-memory
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
data:
  99-kind-memory.xml: |
    <clickhouse>
      <logger>
        <level>warning</level>
        <console>true</console>
      </logger>
      <max_server_memory_usage>805306368</max_server_memory_usage>
      <mark_cache_size>67108864</mark_cache_size>
      <uncompressed_cache_size>33554432</uncompressed_cache_size>
      <max_thread_pool_size>256</max_thread_pool_size>
      <background_buffer_flush_schedule_pool_size>2</background_buffer_flush_schedule_pool_size>
      <background_pool_size>4</background_pool_size>
      <background_merges_mutations_concurrency_ratio>1</background_merges_mutations_concurrency_ratio>
      <background_move_pool_size>2</background_move_pool_size>
      <background_fetches_pool_size>2</background_fetches_pool_size>
      <background_common_pool_size>2</background_common_pool_size>
      <background_schedule_pool_size>8</background_schedule_pool_size>
      <background_message_broker_schedule_pool_size>2</background_message_broker_schedule_pool_size>
      <background_distributed_schedule_pool_size>2</background_distributed_schedule_pool_size>
      <merge_tree>
        <number_of_free_entries_in_pool_to_lower_max_size_of_merge>1</number_of_free_entries_in_pool_to_lower_max_size_of_merge>
        <number_of_free_entries_in_pool_to_execute_mutation>1</number_of_free_entries_in_pool_to_execute_mutation>
        <number_of_free_entries_in_pool_to_execute_optimize_entire_partition>1</number_of_free_entries_in_pool_to_execute_optimize_entire_partition>
      </merge_tree>
      <query_log remove="1"/>
      <query_thread_log remove="1"/>
      <query_views_log remove="1"/>
      <query_metric_log remove="1"/>
      <trace_log remove="1"/>
      <text_log remove="1"/>
      <metric_log remove="1"/>
      <asynchronous_metric_log remove="1"/>
      <asynchronous_insert_log remove="1"/>
      <error_log remove="1"/>
      <part_log remove="1"/>
      <processors_profile_log remove="1"/>
      <background_schedule_pool_log remove="1"/>
      <opentelemetry_span_log remove="1"/>
    </clickhouse>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: uno-arena
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  progressDeadlineSeconds: 7200
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: uno-arena
        uno-arena.local/context: analytics
    spec:
      serviceAccountName: clickhouse
      automountServiceAccountToken: false
      containers:
        - name: clickhouse
          image: {{ .Values.image.repository }}@{{ required "image.digest is required" .Values.image.digest }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: analytics
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: platform-credentials
                  key: clickhouse-admin-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-credentials
                  key: clickhouse-admin-password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: memory-config
              mountPath: /etc/clickhouse-server/config.d/99-kind-memory.xml
              subPath: 99-kind-memory.xml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18
          startupProbe:
            httpGet:
              path: /ping
              port: 8123
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 720
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              # The arm64 server binary is roughly 730 MiB by itself. A 1 GiB
              # cgroup repeatedly evicts its executable pages during cold start.
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: memory-config
          configMap:
            name: clickhouse-kind-memory
