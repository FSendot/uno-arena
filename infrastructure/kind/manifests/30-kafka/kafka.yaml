# Single-node Kafka KRaft broker. Explicitly non-HA: RF1 / minISR1 (ADR-0031 local).
# No PVC/backup claim. ClusterIP only.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
    uno-arena.local/kafka-ha: "false"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
    uno-arena.local/kafka-ha: "false"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: uno-arena
        uno-arena.local/kafka-ha: "false"
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.3.1@sha256:77e3df9054047a88b520d0cc46e16696d3b22022e1d580aeccd2632df6532837
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka.uno-arena.svc.cluster.local:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              # Single-node KRaft: controller votes via loopback (valid self-discovery).
              # Clients use Service DNS via KAFKA_ADVERTISED_LISTENERS only.
              value: 1@127.0.0.1:9093
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "1"
            # The image defaults to a 1 GiB initial heap. That minimum alone can
            # push the complete single-node acceptance stack into swap.
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256M -Xmx512M"
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: uno-arena-local-images
                  key: KAFKA_CLUSTER_ID
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          # Lightweight TCP probes: kafka-topics.sh exec probes can hang while the
          # broker is already listening, leaving the Service with no ready endpoints.
          # Topic create/drift checks remain in the bootstrap-kafka-topics Job.
          startupProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
      volumes:
        - name: data
          emptyDir: {}
