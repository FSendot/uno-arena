# Analytics ClickHouse bootstrap Job (ADR-0028).
apiVersion: batch/v1
kind: Job
metadata:
  name: bootstrap-clickhouse-analytics
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: bootstrap-clickhouse-analytics
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/bootstrap: clickhouse
    uno-arena.local/non-production: "true"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bootstrap-clickhouse-analytics
        uno-arena.local/context: analytics
        uno-arena.local/bootstrap: clickhouse
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: uno-arena/bootstrap:local
          imagePullPolicy: IfNotPresent
          args: ["clickhouse"]
          env:
            - name: CLICKHOUSE_HOST
              value: clickhouse.uno-arena.svc.cluster.local
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: EXPECTED_VERSION
              value: "001_init"
            - name: MIGRATION_FILE
              value: /bootstrap/migrations/analytics/001_init.sql
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: clickhouse-admin-user
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: clickhouse-admin-password
            - name: BOOTSTRAP_USER
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: analytics-bootstrap-user
            - name: BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: analytics-bootstrap-password
            - name: RUNTIME_USER
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: analytics-runtime-user
            - name: RUNTIME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: analytics-runtime-password
