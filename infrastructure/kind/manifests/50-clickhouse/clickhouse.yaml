# Disposable ClickHouse for Analytics. Schema via bootstrap Job (ADR-0028).
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: uno-arena
        uno-arena.local/context: analytics
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:26.6.1.1193@sha256:1d1f6508eba2dccce2cee9913907c5f7766327debc57a6b1991f2c9e3176c163
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: analytics
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: clickhouse-admin-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: clickhouse-admin-password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1536Mi
      volumes:
        - name: data
          emptyDir: {}
