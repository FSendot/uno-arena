# Disposable ClickHouse for Analytics. Schema via bootstrap Job (ADR-0028).
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-kind-memory
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
data:
  99-kind-memory.xml: |
    <clickhouse>
      <max_server_memory_usage>805306368</max_server_memory_usage>
      <mark_cache_size>67108864</mark_cache_size>
      <uncompressed_cache_size>33554432</uncompressed_cache_size>
    </clickhouse>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: analytics
    uno-arena.local/non-production: "true"
spec:
  progressDeadlineSeconds: 7200
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/part-of: uno-arena
        uno-arena.local/context: analytics
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:26.6.1.1193@sha256:1d1f6508eba2dccce2cee9913907c5f7766327debc57a6b1991f2c9e3176c163
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: analytics
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: clickhouse-admin-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: clickhouse-admin-password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: memory-config
              mountPath: /etc/clickhouse-server/config.d/99-kind-memory.xml
              subPath: 99-kind-memory.xml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18
          startupProbe:
            httpGet:
              path: /ping
              port: 8123
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 720
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              # The arm64 server binary is roughly 730 MiB by itself. A 1 GiB
              # cgroup repeatedly evicts its executable pages during cold start.
              memory: 2Gi
      volumes:
        - name: data
          emptyDir: {}
        - name: memory-config
          configMap:
            name: clickhouse-kind-memory
