# Disposable single-instance Postgres for Identity. No HA/PVC/backup claim.
apiVersion: v1
kind: Service
metadata:
  name: postgres-identity
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: postgres-identity
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: identity
    uno-arena.local/non-production: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-identity
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-identity
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: postgres-identity
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/context: identity
    uno-arena.local/non-production: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-identity
        app.kubernetes.io/part-of: uno-arena
        uno-arena.local/context: identity
    spec:
      containers:
        - name: postgres
          image: postgres:18.4-alpine3.24
          imagePullPolicy: IfNotPresent
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_replication_slots=8"
            - "-c"
            - "max_wal_senders=8"
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: identity-admin-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uno-arena-local-credentials
                  key: identity-admin-password
            - name: POSTGRES_DB
              value: identity
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "identity_admin", "-d", "identity"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "identity_admin", "-d", "identity"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
