# Disposable Redis. No schema bootstrap Job (ADR-0028). No PVC/backup claim.
# Local AOF (appendonly yes, appendfsync everysec) under emptyDir /data/appendonlydir
# survives same-pod Redis container restart only. Pod replacement or kind reset may
# lose emptyDir data; rebuild from Kafka. Redis is not authoritative.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: uno-arena
    spec:
      # Keep exec probes from accumulating as zombies under redis-server PID 1.
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --dir
            - /data
            - --save
            - ""
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --appenddirname
            - appendonlydir
            - --shutdown-on-sigterm
            - default
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              # PONG required: LOADING during AOF replay must fail readiness.
              command: ["/bin/sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 2
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
