# LOCAL-ONLY placeholder credentials. Never reuse in staging/production.
# Values are obvious non-secrets for disposable kind verification.
# Context admin/bootstrap/runtime credentials are not shared across contexts.
apiVersion: v1
kind: Secret
metadata:
  name: uno-arena-local-credentials
  namespace: uno-arena
  labels:
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
  annotations:
    uno-arena.local/warning: "Local-only placeholder credentials. Not for production."
type: Opaque
stringData:
  # Per-context Postgres admin (container POSTGRES_USER). Distinct passwords per DB.
  identity-admin-user: identity_admin
  identity-admin-password: local-only-identity-admin
  room-admin-user: room_admin
  room-admin-password: local-only-room-admin
  tournament-admin-user: tournament_admin
  tournament-admin-password: local-only-tournament-admin
  ranking-admin-user: ranking_admin
  ranking-admin-password: local-only-ranking-admin
  # Context bootstrap (DDL) vs runtime (DML) credentials
  identity-bootstrap-user: identity_bootstrap
  identity-bootstrap-password: local-only-identity-bootstrap
  identity-runtime-user: identity_runtime
  identity-runtime-password: local-only-identity-runtime
  room-bootstrap-user: room_bootstrap
  room-bootstrap-password: local-only-room-bootstrap
  room-runtime-user: room_runtime
  room-runtime-password: local-only-room-runtime
  tournament-bootstrap-user: tournament_bootstrap
  tournament-bootstrap-password: local-only-tournament-bootstrap
  tournament-runtime-user: tournament_runtime
  tournament-runtime-password: local-only-tournament-runtime
  ranking-bootstrap-user: ranking_bootstrap
  ranking-bootstrap-password: local-only-ranking-bootstrap
  ranking-runtime-user: ranking_runtime
  ranking-runtime-password: local-only-ranking-runtime
  # Context CDC (LOGIN REPLICATION). Distinct from runtime; no cross-context reuse.
  # Debezium owns logical slot lifecycle — bootstrap creates roles/publications only.
  identity-cdc-user: identity_cdc
  identity-cdc-password: local-only-identity-cdc
  room-cdc-kafka-user: room_cdc_kafka
  room-cdc-kafka-password: local-only-room-cdc-kafka
  room-cdc-realtime-user: room_cdc_realtime
  room-cdc-realtime-password: local-only-room-cdc-realtime
  tournament-cdc-user: tournament_cdc
  tournament-cdc-password: local-only-tournament-cdc
  ranking-cdc-user: ranking_cdc
  ranking-cdc-password: local-only-ranking-cdc
  # ClickHouse
  clickhouse-admin-user: clickhouse_admin
  clickhouse-admin-password: local-only-ch-admin
  analytics-bootstrap-user: analytics_bootstrap
  analytics-bootstrap-password: local-only-analytics-bootstrap
  analytics-runtime-user: analytics_runtime
  analytics-runtime-password: local-only-analytics-runtime
  # Keycloak start-dev admin (local reference IdP only)
  keycloak-admin-user: admin
  keycloak-admin-password: local-only-keycloak-admin
  # Game Integrity local-only envelope encryption (ADR-0024). Never reuse outside kind/local.
  game-integrity-internal-credential: local-gi-room
  game-integrity-audit-credential: local-gi-operator
  game-integrity-envelope-dev-keys: "1:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  # Identity durable runtime (writer DSN + internal service credential). ClusterIP only.
  identity-internal-credential: local-gw-backend
  identity-database-url: "postgres://identity_runtime:local-only-identity-runtime@postgres-identity.uno-arena.svc.cluster.local:5432/identity?sslmode=disable"
  # Room Gameplay durable runtime (writer DSN + peer credentials). ClusterIP only.
  room-service-credential: local-gw-backend
  room-to-gateway-credential: local-room-to-gw
  room-identity-credential: local-gw-backend
  room-timer-service-credential: local-room-timer
  spectator-view-internal-credential: local-room-to-spectator
  ranking-internal-credential: local-room-to-ranking
  analytics-room-credential: local-analytics-room
  analytics-ranking-credential: local-analytics-ranking
  analytics-tournament-credential: local-analytics-tournament
  analytics-ops-credential: local-analytics-ops
  tournament-internal-credential: local-room-to-tournament
  room-database-url: "postgres://room_runtime:local-only-room-runtime@postgres-room-gameplay.uno-arena.svc.cluster.local:5432/room_gameplay?sslmode=disable"
  # Tournament Orchestration durable runtime (writer DSN). ClusterIP only.
  tournament-database-url: "postgres://tournament_runtime:local-only-tournament-runtime@postgres-tournament.uno-arena.svc.cluster.local:5432/tournament?sslmode=disable"
  # Ranking durable runtime (writer DSN). ClusterIP only. CDC/Redis projection later.
  ranking-database-url: "postgres://ranking_runtime:local-only-ranking-runtime@postgres-ranking.uno-arena.svc.cluster.local:5432/ranking?sslmode=disable"
  # Analytics durable ClickHouse runtime (HTTP). Kafka ingestion later.
  # CLICKHOUSE_URL is chart env; credentials are analytics-runtime-user/password above.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uno-arena-local-gi-envelope
  namespace: uno-arena
  labels:
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
  annotations:
    uno-arena.local/warning: "Local-only GI envelope provider settings. Not for production."
data:
  DEPLOYMENT_ENV: local
  GAME_INTEGRITY_ENVELOPE_PROVIDER: dev
  GAME_INTEGRITY_ENVELOPE_KEY_VERSION: "1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uno-arena-local-identity-oidc
  namespace: uno-arena
  labels:
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
  annotations:
    uno-arena.local/warning: "Local-only Identity OIDC/Keycloak reference settings. Not for production."
data:
  DEPLOYMENT_ENV: local
  OIDC_ISSUER_URL: http://keycloak.uno-arena.svc.cluster.local:8080/realms/unoarena
  OIDC_TOKEN_ENDPOINT: http://keycloak.uno-arena.svc.cluster.local:8080/realms/unoarena/protocol/openid-connect/token
  OIDC_AUDIENCE: unoarena-cli
  OIDC_CLIENT_ID: unoarena-cli
  OIDC_ALLOW_HTTP: "true"
  IDENTITY_ALLOW_PASSWORD_LOGIN: "true"
  IDENTITY_OIDC_DIRECT_GRANT: "true"
  IDENTITY_ALLOW_TEST_PROVISIONING: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uno-arena-local-images
  namespace: uno-arena
  labels:
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
data:
  # Pins aligned with .env.example / docker-compose.local.yml where applicable.
  POSTGRES_IMAGE: postgres:18.4-alpine3.24
  KAFKA_IMAGE: apache/kafka:4.3.1
  REDIS_IMAGE: redis:8.8.0-alpine
  CLICKHOUSE_IMAGE: clickhouse/clickhouse-server:26.6.1.1193
  KEYCLOAK_IMAGE: quay.io/keycloak/keycloak:26.7.0
  BOOTSTRAP_IMAGE: uno-arena/bootstrap:local
  # Experimental ARM64 local-only digest (ADR-0035).
  KURRENTDB_IMAGE: kurrentplatform/kurrentdb:26.0.3-experimental-arm64-10.0-noble@sha256:8498556a8ba7a74f8d4ea31a149b1e5216e167d6884b630a68b3e1eb9e6e870e
  KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  EXPECTED_SCHEMA_VERSION: "001_init"
