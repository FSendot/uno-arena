apiVersion: v1
kind: Secret
metadata:
  name: minio-observability
  namespace: observability
  annotations: {uno-arena.local/warning: "Local-only disposable credentials"}
type: Opaque
stringData:
  access-key-id: minioadmin
  secret-access-key: local-only-minioadmin
---
apiVersion: v1
kind: Secret
metadata:
  name: uno-arena-local-observability
  namespace: observability
  annotations: {uno-arena.local/warning: "Local-only disposable credentials"}
type: Opaque
stringData:
  admin-user: admin
  admin-password: local-only-grafana-admin
---
apiVersion: v1
kind: ServiceAccount
metadata: {name: minio, namespace: observability}
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: minio-data, namespace: observability}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: {storage: 5Gi}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: minio, namespace: observability}
spec:
  replicas: 1
  selector: {matchLabels: {app.kubernetes.io/name: minio}}
  template:
    metadata: {labels: {app.kubernetes.io/name: minio}}
    spec:
      serviceAccountName: minio
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: minio
          image: quay.io/minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - {name: MINIO_ROOT_USER, valueFrom: {secretKeyRef: {name: minio-observability, key: access-key-id}}}
            - {name: MINIO_ROOT_PASSWORD, valueFrom: {secretKeyRef: {name: minio-observability, key: secret-access-key}}}
          ports:
            - {name: api, containerPort: 9000}
            - {name: console, containerPort: 9001}
          readinessProbe: {httpGet: {path: /minio/health/ready, port: api}, initialDelaySeconds: 5}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}, runAsUser: 1000, runAsGroup: 1000}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: "1", memory: 1Gi}
          volumeMounts: [{name: data, mountPath: /data}]
      volumes: [{name: data, persistentVolumeClaim: {claimName: minio-data}}]
---
apiVersion: v1
kind: Service
metadata: {name: minio, namespace: observability}
spec:
  type: ClusterIP
  selector: {app.kubernetes.io/name: minio}
  ports:
    - {name: api, port: 9000, targetPort: api}
