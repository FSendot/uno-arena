apiVersion: v1
kind: ServiceAccount
metadata: {name: minio-bucket-bootstrap, namespace: observability}
automountServiceAccountToken: false
---
apiVersion: batch/v1
kind: Job
metadata: {name: minio-create-observability-buckets, namespace: observability}
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata: {labels: {app.kubernetes.io/name: minio-bucket-bootstrap}}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: minio-bucket-bootstrap
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, fsGroup: 1000, fsGroupChangePolicy: OnRootMismatch, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: mc
          image: quay.io/minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              until mc --config-dir /tmp/mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
              mc --config-dir /tmp/mc mb --ignore-existing local/loki-logs
              mc --config-dir /tmp/mc mb --ignore-existing local/tempo-traces
          env:
            - {name: MINIO_ROOT_USER, valueFrom: {secretKeyRef: {name: minio-observability, key: access-key-id}}}
            - {name: MINIO_ROOT_PASSWORD, valueFrom: {secretKeyRef: {name: minio-observability, key: secret-access-key}}}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}, readOnlyRootFilesystem: true, runAsUser: 1000, runAsGroup: 1000}
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
          volumeMounts:
            - {name: mc-config, mountPath: /tmp/mc}
      volumes:
        - {name: mc-config, emptyDir: {sizeLimit: 8Mi}}
