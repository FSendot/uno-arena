# Debezium Kafka Connect 3.6.0.Final — Phase 1 durable Kafka CDC (ADR-0016).
# Workload pins the exact quay.io multi-architecture index; imagePullPolicy Never so kubelet
# never registry-pulls — make kind-load-debezium-connect (node-native crictl pull)
# is mandatory before pods can start. kind load is not used for this image.
# Connect internal topics (connect-configs/offsets/status) are created by
# bootstrap-kafka-topics (compact RF1); do not recreate differently.
# Debezium Server (Redis realtime) is out of scope for this slice.
apiVersion: v1
kind: Service
metadata:
  name: debezium-connect
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: debezium-connect
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
    uno-arena.local/debezium-role: kafka-connect
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: debezium-connect
  ports:
    - name: rest
      port: 8083
      targetPort: 8083
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-connect-templates
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: debezium-connect
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
    uno-arena.local/debezium-role: kafka-connect
data:
  # Workload image = exact SOURCE_IMAGE_REF. Loader: docker exec + crictl pull on kind node.
  SOURCE_IMAGE_REF: quay.io/debezium/connect:3.6.0.Final@sha256:d574a7c9575ed78e2349a034ebdf57a99c516771b3dddb7bbeeb44f912a36e22
  IMAGE_VERSION: 3.6.0.Final
  MULTIARCH_INDEX_DIGEST: sha256:d574a7c9575ed78e2349a034ebdf57a99c516771b3dddb7bbeeb44f912a36e22
  # Shared Outbox Event Router field contract (column names match migrations).
  OUTBOX_ROUTER_NOTES: |
    route.by.field=topic
    route.topic.replacement=${routedByValue}
    table.field.event.id=event_id
    table.field.event.key=partition_key
    table.field.event.payload=payload
    table.fields.additional.placement=event_type:header:type,traceparent:header:traceparent,tracestate:header:tracestate
    table.expand.json.payload=true (schema-disabled canonical payload objects)
    Kafka record timestamp uses the connector source time. Canonical occurredAt
    remains inside each JSON payload; Postgres timestamptz is not an INT64 SMT field.
  connector-identity-outbox.json: |
    {
      "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
      "tasks.max": "1",
      "plugin.name": "pgoutput",
      "publication.autocreate.mode": "disabled",
      "publication.name": "identity_cdc_outbox",
      "slot.name": "identity_outbox_slot",
      "topic.prefix": "identity",
      "database.hostname": "postgres-identity.uno-arena.svc.cluster.local",
      "database.port": "5432",
      "database.dbname": "identity",
      "database.user": "${CDC_USER}",
      "database.password": "${CDC_PASSWORD}",
      "table.include.list": "public.outbox_events",
      "snapshot.mode": "no_data",
      "tombstones.on.delete": "false",
      "key.converter": "org.apache.kafka.connect.storage.StringConverter",
      "value.converter": "org.apache.kafka.connect.json.JsonConverter",
      "value.converter.schemas.enable": "false",
      "key.converter.schemas.enable": "false",
      "transforms": "outbox",
      "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
      "transforms.outbox.table.field.event.id": "event_id",
      "transforms.outbox.table.field.event.key": "partition_key",
      "transforms.outbox.table.field.event.payload": "payload",
      "transforms.outbox.table.expand.json.payload": "true",
      "transforms.outbox.route.by.field": "topic",
      "transforms.outbox.route.topic.replacement": "${routedByValue}",
      "transforms.outbox.table.fields.additional.placement": "event_type:header:type,traceparent:header:traceparent,tracestate:header:tracestate",
      "transforms.outbox.table.op.invalid.behavior": "warn"
    }
  connector-room-integration-outbox.json: |
    {
      "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
      "tasks.max": "1",
      "plugin.name": "pgoutput",
