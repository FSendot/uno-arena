apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-connect
  namespace: uno-arena
  labels:
    app.kubernetes.io/name: debezium-connect
    app.kubernetes.io/part-of: uno-arena
    uno-arena.local/non-production: "true"
    uno-arena.local/debezium-role: kafka-connect
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: debezium-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: debezium-connect
        app.kubernetes.io/part-of: uno-arena
        uno-arena.local/non-production: "true"
        uno-arena.local/debezium-role: kafka-connect
    spec:
      enableServiceLinks: false
      containers:
        - name: connect
          # Exact quay multiarch index; Never = node must already hold its resolved child.
          image: quay.io/debezium/connect:3.6.0.Final@sha256:d574a7c9575ed78e2349a034ebdf57a99c516771b3dddb7bbeeb44f912a36e22
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
              name: rest
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka.uno-arena.svc.cluster.local:9092
            - name: GROUP_ID
              value: uno-arena-debezium-connect
            - name: CONFIG_STORAGE_TOPIC
              value: connect-configs
            - name: OFFSET_STORAGE_TOPIC
              value: connect-offsets
            - name: STATUS_STORAGE_TOPIC
              value: connect-status
            # Match kind bootstrap RF1 compacted internals; do not auto-create differently.
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            # This local topology has exactly one worker. Do not retain the
            # distributed default five-minute delay after a brief broker stall;
            # there is no second worker whose return needs that grace period.
            - name: CONNECT_SCHEDULED_REBALANCE_MAX_DELAY_MS
              value: "10000"
            # Worker-level converters omitted: each connector sets key/value converters.
            # Image default is -Xmx2G. The reviewed local heap leaves native,
            # metaspace, and plugin-scan headroom under the 1Gi limit.
            - name: KAFKA_HEAP_OPTS
              value: "-Xms128M -Xmx512M"
            - name: REST_HOST_NAME
              value: "0.0.0.0"
            - name: ADVERTISED_HOST_NAME
              value: debezium-connect.uno-arena.svc.cluster.local
            # The bundled Debezium plugins all publish ServiceLoader metadata.
            # Avoid Kafka Connect's legacy reflective second scan, which can
            # exceed the local liveness budget under single-node contention.
            - name: CONNECT_PLUGIN_DISCOVERY
              value: service_load
          volumeMounts:
            - name: templates
              mountPath: /kafka/uno-arena-templates
              readOnly: true
          startupProbe:
            httpGet:
              path: /
              port: rest
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: rest
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /
              port: rest
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 1024Mi
              cpu: "1"
      volumes:
        - name: templates
          configMap:
            name: debezium-connect-templates
