# Local kind cluster for UnoArena disposable foundation.
# Not production. No HA, backup, or durability claim.
#
# Ingress / host-port strategy (documented only; this slice does not install
# an ingress controller or claim production ingress):
# - kind maps host 8080→node 80 and host 8443→node 443 so a later local
#   ingress controller can publish the BFF without LoadBalancer Services.
# - Application and datastore Services in this foundation stay ClusterIP.
# - Do not expose Postgres, Kafka, Redis, KurrentDB, ClickHouse, or Keycloak
#   via LoadBalancer or hostPort on the datastore pods.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: uno-arena
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
networking:
  # Single-node local cluster; no multi-zone topology claim.
  disableDefaultCNI: false
