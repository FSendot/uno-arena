profile: ambient
image: docker.io/istio/ztunnel@sha256:64d7c4ea9621fdad66160744dcf76999995fcc0ac399d04aba76d6d0aae72242
imagePullPolicy: IfNotPresent
env:
  # kind is IPv4-only. Without this ztunnel still attempts to bind its in-pod
  # DNS listener on ::1 and can block every CNI ADD after a node restart.
  IPV6_ENABLED: "false"
resources:
  requests: {cpu: 500m, memory: 128Mi}
  limits: {cpu: "1", memory: 512Mi}
