profile: ambient
image: docker.io/istio/install-cni@sha256:b2eb80818fc345e3e9033f424ec7757cbf1a9d9a6494fea79648dab4887f2f7f
ambient:
  # kind is created as IPv4-only. Advertising IPv6 makes ztunnel bind ::1 in
  # new pod namespaces where IPv6 is unavailable, blocking CNI ADD.
  ipv6: false
  # Kubernetes DNS remains authoritative locally. Avoiding the optional
  # ambient DNS proxy keeps native nftables programming within CNI's deadline
  # on the deliberately small worker nodes.
  dnsCapture: false
  # OrbStack/node restarts can preserve pod sandboxes while losing their ambient
  # redirection state. Reconcile existing namespaces so strict mTLS does not
  # reject their traffic as plaintext after the node returns.
  reconcileIptablesOnStartup: true
global:
  imagePullPolicy: IfNotPresent
  nativeNftables: true
resources:
  requests: {cpu: 500m, memory: 100Mi}
  limits: {cpu: "2", memory: 512Mi}
