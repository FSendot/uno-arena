storage:
  s3:
    endpoint: ""
    region: ""
    forcePathStyle: false
    insecure: false
    existingSecret: uno-arena-observability-s3
    lokiBucket: ""
    tempoBucket: ""

alertmanager:
  receiver:
    existingSecret: uno-arena-observability-alertmanager
    externalSecret:
      enabled: true
      secretStoreRef:
        kind: ClusterSecretStore
        name: production-secrets
      remoteKey: uno-arena-production-observability
      remoteProperty: alertmanager-webhook-url
  webhookSink:
    enabled: false

grafana:
  existingAdminSecret: uno-arena-observability-grafana

prometheus:
  scrapeInterval: 30s
  evaluationInterval: 30s
  scrapeTimeout: 10s

# Production consumes the shared external Redis TLS/auth endpoint contract.
# Local lanes retain the in-cluster address from the base values.
redisExporter:
  address: ""
  existingSecret: platform-endpoints
  addressKey: redis-url

productionPreflight:
  redis:
    enabled: true

postSyncEvidence:
  enabled: true
