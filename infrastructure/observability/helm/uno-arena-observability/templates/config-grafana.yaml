apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ include "uno-observability.namespace" . }}
  labels:
    {{- include "uno-observability.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    deleteDatasources:
      - {name: Prometheus, orgId: 1}
      - {name: Loki, orgId: 1}
      - {name: Tempo, orgId: 1}
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"trace_id":"([a-f0-9]{32})"'
              datasourceUid: tempo
              url: '$${__value.raw}'
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: true
            tags:
              - {key: service.name, value: service}
              - {key: unoarena.component, value: component}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ include "uno-observability.namespace" . }}
  labels:
    {{- include "uno-observability.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: Uno Arena
        orgId: 1
        folder: Uno Arena
        type: file
        disableDeletion: true
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-business-dashboard
  namespace: {{ include "uno-observability.namespace" . }}
  labels:
    {{- include "uno-observability.labels" . | nindent 4 }}
data:
  business.json: |
    {
      "uid": "uno-arena-business",
      "title": "Uno Arena - Business Metrics",
      "editable": false,
      "schemaVersion": 39,
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {"id": 1, "type": "stat", "title": "Players created", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum(increase(unoarena_players_created_total[$__range]))", "refId": "A"}], "gridPos": {"x": 0, "y": 0, "w": 8, "h": 8}},
        {"id": 2, "type": "stat", "title": "Games completed", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum(increase(unoarena_games_completed_total[$__range]))", "refId": "A"}], "gridPos": {"x": 8, "y": 0, "w": 8, "h": 8}},
        {"id": 3, "type": "stat", "title": "Tournaments completed", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum(increase(unoarena_tournaments_completed_total[$__range]))", "refId": "A"}], "gridPos": {"x": 16, "y": 0, "w": 8, "h": 8}}
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-red-dashboard
  namespace: {{ include "uno-observability.namespace" . }}
  labels:
    {{- include "uno-observability.labels" . | nindent 4 }}
data:
  red.json: |
    {
      "uid": "uno-arena-red",
      "title": "Uno Arena - API HTTP RED",
      "editable": false,
      "schemaVersion": 39,
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {"name": "service", "type": "query", "datasource": {"uid": "prometheus", "type": "prometheus"}, "query": {"query": "label_values(unoarena:http_requests:rate5m, service)", "refId": "service"}, "includeAll": true, "multi": true}
        ]
      },
      "panels": [
        {"id": 1, "type": "timeseries", "title": "Request rate", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum by (service) (unoarena:http_requests:rate5m{service=~\"$service\"})", "legendFormat": "{{ "{{" }}service{{ "}}" }}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "reqps"}}, "gridPos": {"x": 0, "y": 0, "w": 8, "h": 8}},
        {"id": 2, "type": "timeseries", "title": "5xx ratio", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "max by (service) (unoarena:http_error_ratio:rate5m{service=~\"$service\"})", "legendFormat": "{{ "{{" }}service{{ "}}" }}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0}}, "gridPos": {"x": 8, "y": 0, "w": 8, "h": 8}},
        {"id": 3, "type": "timeseries", "title": "HTTP p95 latency", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "max by (service) (unoarena:http_request_duration_seconds:p95_5m{service=~\"$service\"})", "legendFormat": "{{ "{{" }}service{{ "}}" }}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "s", "min": 0}}, "gridPos": {"x": 16, "y": 0, "w": 8, "h": 8}},
        {"id": 4, "type": "table", "title": "Down scrape targets (APIs and workers)", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "up == 0", "instant": true, "format": "table", "refId": "A"}], "gridPos": {"x": 0, "y": 8, "w": 24, "h": 8}}
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-cluster-dashboard
  namespace: {{ include "uno-observability.namespace" . }}
  labels:
    {{- include "uno-observability.labels" . | nindent 4 }}
data:
  cluster.json: |
    {
      "uid": "uno-arena-cluster",
      "title": "Uno Arena - Kubernetes Cluster",
      "editable": false,
      "schemaVersion": 39,
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {"id": 1, "type": "stat", "title": "Ready pods", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum(kube_pod_status_ready{condition=\"true\"})", "refId": "A"}], "gridPos": {"x": 0, "y": 0, "w": 6, "h": 8}},
        {"id": 2, "type": "stat", "title": "Unavailable replicas", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum(kube_deployment_status_replicas_unavailable)", "refId": "A"}], "gridPos": {"x": 6, "y": 0, "w": 6, "h": 8}},
        {"id": 3, "type": "timeseries", "title": "Container restarts", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[$__rate_interval]))", "refId": "A"}], "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8}},
        {"id": 4, "type": "timeseries", "title": "Pod CPU", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{container!=\"\"}[$__rate_interval]))", "refId": "A"}], "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8}},
        {"id": 5, "type": "timeseries", "title": "Pod memory", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum by (namespace, pod) (container_memory_working_set_bytes{container!=\"\"})", "refId": "A"}], "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8}},
        {"id": 6, "type": "timeseries", "title": "Pod network", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum by (namespace, pod) (rate(container_network_receive_bytes_total[$__rate_interval]) + rate(container_network_transmit_bytes_total[$__rate_interval]))", "refId": "A"}], "gridPos": {"x": 0, "y": 16, "w": 12, "h": 8}},
        {"id": 7, "type": "timeseries", "title": "Container filesystem", "datasource": {"uid": "prometheus", "type": "prometheus"}, "targets": [{"expr": "sum by (namespace, pod) (container_fs_usage_bytes{container!=\"\"})", "refId": "A"}], "gridPos": {"x": 12, "y": 16, "w": 12, "h": 8}}
      ]
    }
