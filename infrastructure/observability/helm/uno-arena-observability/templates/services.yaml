{{- $ns := include "uno-observability.namespace" . -}}
{{- range $service := list
  (dict "name" "alloy-otlp" "selector" "alloy-otlp" "ports" (list (dict "name" "otlp-grpc" "port" 4317) (dict "name" "otlp-http" "port" 4318) (dict "name" "http" "port" 12345)))
  (dict "name" "loki" "selector" "loki" "ports" (list (dict "name" "http" "port" 3100)))
  (dict "name" "tempo" "selector" "tempo" "ports" (list (dict "name" "http" "port" 3200) (dict "name" "otlp-grpc" "port" 4317) (dict "name" "otlp-http" "port" 4318)))
  (dict "name" "prometheus" "selector" "prometheus" "ports" (list (dict "name" "http" "port" 9090)))
  (dict "name" "kube-state-metrics" "selector" "kube-state-metrics" "ports" (list (dict "name" "http" "port" 8080)))
  (dict "name" "grafana" "selector" "grafana" "ports" (list (dict "name" "http" "port" 3000)))
}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $service.name }}
  namespace: {{ $ns }}
  labels: {app.kubernetes.io/name: {{ $service.name }}}
spec:
  type: ClusterIP
  selector: {app.kubernetes.io/name: {{ $service.selector }}}
  ports:
    {{- range $port := $service.ports }}
    - name: {{ $port.name }}
      port: {{ $port.port }}
      targetPort: {{ $port.name }}
    {{- end }}
{{- end }}

