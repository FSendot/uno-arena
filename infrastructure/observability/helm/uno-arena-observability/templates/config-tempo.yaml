apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: {{ include "uno-observability.namespace" . }}
  labels:
    {{- include "uno-observability.labels" . | nindent 4 }}
data:
  tempo.yaml: |
    multitenancy_enabled: false
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    live_store:
      max_block_duration: {{ .Values.storage.tempoLiveStore.maxBlockDuration }}
    backend_scheduler:
      work:
        prune_age: {{ .Values.storage.tempoCompaction.pruneAge }}
      provider:
        compaction:
          measure_interval: {{ .Values.storage.tempoCompaction.measureInterval }}
          min_cycle_interval: {{ .Values.storage.tempoCompaction.minCycleInterval }}
          min_input_blocks: {{ .Values.storage.tempoCompaction.minInputBlocks }}
          max_input_blocks: {{ .Values.storage.tempoCompaction.maxInputBlocks }}
          compaction:
            block_retention: {{ .Values.storage.tempoRetention }}
    backend_worker:
      compaction:
        block_retention: {{ .Values.storage.tempoRetention }}
    storage:
      trace:
        backend: s3
        blocklist_poll: {{ .Values.storage.tempoLiveStore.blocklistPoll }}
        wal:
          path: /var/tempo/wal
        s3:
          endpoint: {{ .Values.storage.s3.endpoint | trimPrefix "http://" | trimPrefix "https://" | quote }}
          bucket: {{ .Values.storage.s3.tempoBucket | quote }}
          region: {{ .Values.storage.s3.region | quote }}
          access_key: ${S3_ACCESS_KEY_ID}
          secret_key: ${S3_SECRET_ACCESS_KEY}
          insecure: {{ .Values.storage.s3.insecure }}
          forcepathstyle: {{ .Values.storage.s3.forcePathStyle }}
    usage_report:
      reporting_enabled: false
