{{- $ns := include "uno-observability.namespace" . -}}
{{- if .Values.security.ambientRequired }}
{{- if .Values.security.managePeerAuthentication }}
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata: {name: strict-mtls, namespace: {{ $ns }}}
spec:
  mtls: {mode: STRICT}
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata: {name: strict-mtls, namespace: {{ .Values.applicationNamespace }}}
spec:
  mtls: {mode: STRICT}
{{- end }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: default-deny, namespace: {{ $ns }}}
spec: {}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: default-deny, namespace: {{ .Values.applicationNamespace }}}
spec: {}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-application-otlp, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: alloy-otlp}}
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              {{- range .Values.security.applicationServiceAccounts }}
              - {{ printf "cluster.local/ns/%s/sa/%s" $.Values.applicationNamespace . | quote }}
              {{- end }}
      to:
        - operation: {ports: ["4317", "4318"]}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-loki-clients, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: loki}}
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - {{ printf "cluster.local/ns/%s/sa/alloy-logs" $ns | quote }}
              - {{ printf "cluster.local/ns/%s/sa/grafana" $ns | quote }}
      to: [{operation: {ports: ["3100"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-tempo-clients, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: tempo}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/alloy-otlp" $ns | quote }}]}}]
      to: [{operation: {ports: ["4317"]}}]
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/grafana" $ns | quote }}]}}]
      to: [{operation: {ports: ["3200"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-prometheus-client, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: prometheus}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/grafana" $ns | quote }}]}}]
      to: [{operation: {ports: ["9090"]}}]
{{- if .Values.postSyncEvidence.enabled }}
# The ambient data plane has no waypoint, so these policies must remain L4.
# The evidence script still limits its own HTTP requests to the named paths.
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-postsync-evidence-prometheus, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: prometheus}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/uno-arena-observability-postsync-evidence" $ns | quote }}]}}]
      to: [{operation: {ports: ["9090"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-postsync-evidence-alertmanager, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: alertmanager}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/uno-arena-observability-postsync-evidence" $ns | quote }}]}}]
      to: [{operation: {ports: ["9093"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-postsync-evidence-gateway, namespace: {{ .Values.applicationNamespace }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: gateway}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/uno-arena-observability-postsync-evidence" $ns | quote }}]}}]
      to: [{operation: {ports: ["8080"]}}]
{{- end }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-kube-state-metrics-client, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: kube-state-metrics}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["8080"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-alloy-logs-metrics, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: alloy-logs}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["12345"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-alloy-otlp-metrics, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: alloy-otlp}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["12345"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-loki-metrics, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: loki}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["3100"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-tempo-metrics, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: tempo}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["3200"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-grafana-metrics, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: grafana}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["3000"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-alertmanager-client, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: alertmanager}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["9093"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-redis-exporter-client, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: redis-exporter}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}}]
      to: [{operation: {ports: ["9121"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-redis-exporter-to-redis, namespace: {{ .Values.applicationNamespace }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: redis}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/redis-exporter" $ns | quote }}]}}]
      to: [{operation: {ports: ["6379"]}}]
{{- if .Values.alertmanager.webhookSink.enabled }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-alert-webhook-sink-client, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: alert-webhook-sink}}
  action: ALLOW
  rules:
    - from: [{source: {principals: [{{ printf "cluster.local/ns/%s/sa/alertmanager" $ns | quote }}]}}]
      to: [{operation: {ports: ["8080"]}}]
{{- end }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: allow-object-store-clients, namespace: {{ $ns }}}
spec:
  selector: {matchLabels: {app.kubernetes.io/name: minio}}
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - {{ printf "cluster.local/ns/%s/sa/loki" $ns | quote }}
              - {{ printf "cluster.local/ns/%s/sa/tempo" $ns | quote }}
              - {{ printf "cluster.local/ns/%s/sa/minio-bucket-bootstrap" $ns | quote }}
      to: [{operation: {ports: ["9000"]}}]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata: {name: prometheus-application-metrics, namespace: {{ .Values.applicationNamespace }}}
spec:
  selector: {matchLabels: {unoarena.io/metrics-exposed: "true"}}
  action: ALLOW
  rules:
    - from:
        - source: {principals: [{{ printf "cluster.local/ns/%s/sa/prometheus" $ns | quote }}]}
      to:
        - operation: {ports: ["9090"]}
{{- end }}
{{- if .Values.security.networkPoliciesEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: isolate-alloy-logs-ingress, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: alloy-logs}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 12345}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 12345}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: isolate-grafana-ingress, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: grafana}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 3000}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 3000}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-loki-clients, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: loki}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - {key: app.kubernetes.io/name, operator: In, values: [alloy-logs, grafana, prometheus]}
      ports:
        - {protocol: TCP, port: 3100}
    - ports: [{protocol: TCP, port: 15008}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 3100}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-tempo-clients, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: tempo}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: alloy-otlp}}}]
      ports:
        - {protocol: TCP, port: 4317}
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: grafana}}}]
      ports:
        - {protocol: TCP, port: 3200}
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports:
        - {protocol: TCP, port: 3200}
    - ports: [{protocol: TCP, port: 15008}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 3200}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-prometheus-client, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: grafana}}}]
      ports:
        - {protocol: TCP, port: 9090}
    {{- if .Values.postSyncEvidence.enabled }}
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: uno-arena-observability-postsync-evidence}}}]
      ports:
        - {protocol: TCP, port: 9090}
    {{- end }}
    - ports: [{protocol: TCP, port: 15008}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 9090}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-kube-state-metrics-client, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: kube-state-metrics}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports:
        - {protocol: TCP, port: 8080}
    - ports: [{protocol: TCP, port: 15008}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 8081}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-object-store-clients, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: minio}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - {key: app.kubernetes.io/name, operator: In, values: [loki, tempo, minio-bucket-bootstrap]}
      ports:
        - {protocol: TCP, port: 9000}
    - ports: [{protocol: TCP, port: 15008}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 9000}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-application-otlp, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: alloy-otlp}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports:
        - {protocol: TCP, port: 12345}
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: {{ .Values.applicationNamespace }}}}
      ports:
        - {protocol: TCP, port: 4317}
        - {protocol: TCP, port: 4318}
    - ports: [{protocol: TCP, port: 15008}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 12345}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-alertmanager-client, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: alertmanager}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 9093}]
    {{- if .Values.postSyncEvidence.enabled }}
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: uno-arena-observability-postsync-evidence}}}]
      ports: [{protocol: TCP, port: 9093}]
    {{- end }}
    - ports: [{protocol: TCP, port: 15008}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-redis-exporter-client, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: redis-exporter}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 9121}]
    - ports: [{protocol: TCP, port: 15008}]
{{- if .Values.alertmanager.webhookSink.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-alert-webhook-sink-client, namespace: {{ $ns }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: alert-webhook-sink}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: alertmanager}}}]
      ports: [{protocol: TCP, port: 8080}]
    - ports: [{protocol: TCP, port: 15008}]
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: prometheus-application-metrics, namespace: {{ .Values.applicationNamespace }}}
spec:
  podSelector: {matchLabels: {unoarena.io/metrics-exposed: "true"}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: {{ $ns }}}}
          podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}
      ports:
        - {protocol: TCP, port: 9090}
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: {{ .Values.applicationNamespace }}}}
      ports:
        - {protocol: TCP, port: 8080}
    - ports: [{protocol: TCP, port: 15008}]
    - from:
        - ipBlock: {cidr: 169.254.7.127/32}
        - ipBlock: {cidr: "fd16:9254:7127:1337:ffff:ffff:ffff:ffff/128"}
      ports: [{protocol: TCP, port: 8080}]
{{- if .Values.postSyncEvidence.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-postsync-evidence-gateway, namespace: {{ .Values.applicationNamespace }}}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: gateway}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: {{ $ns }}}}
          podSelector: {matchLabels: {app.kubernetes.io/name: uno-arena-observability-postsync-evidence}}
      ports: [{protocol: TCP, port: 8080}]
{{- end }}
{{- end }}
