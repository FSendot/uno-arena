apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ include "uno-observability.namespace" . }}
  labels:
    {{- include "uno-observability.labels" . | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /var/loki
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    ingester:
      wal:
        enabled: true
        dir: /var/loki/wal
        flush_on_shutdown: true
        disk_full_threshold: {{ .Values.storage.lokiWal.diskFullThreshold }}
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-index
        cache_location: /var/loki/tsdb-cache
        cache_ttl: 24h
      aws:
        endpoint: {{ .Values.storage.s3.endpoint | quote }}
        region: {{ .Values.storage.s3.region | quote }}
        bucketnames: {{ .Values.storage.s3.lokiBucket | quote }}
        s3forcepathstyle: {{ .Values.storage.s3.forcePathStyle }}
        insecure: {{ .Values.storage.s3.insecure }}
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      delete_request_store: s3
    limits_config:
      retention_period: {{ .Values.storage.lokiRetention }}
      allow_structured_metadata: true
      # Preserve the explicit bounded `service` label without minting a duplicate.
      discover_service_name: []
      reject_old_samples: true
      reject_old_samples_max_age: 24h
