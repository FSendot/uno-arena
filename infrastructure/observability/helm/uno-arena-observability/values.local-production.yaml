storage:
  s3:
    endpoint: http://minio.observability.svc.cluster.local:9000
    region: us-east-1
    forcePathStyle: true
    insecure: true
    existingSecret: minio-observability
    lokiBucket: loki-logs
    tempoBucket: tempo-traces
  tempoWal:
    storageClassName: uno-arena-local-retain
  prometheus:
    storageClassName: uno-arena-local-retain
  alertmanager:
    storageClassName: uno-arena-local-retain

alertmanager:
  receiver:
    existingSecret: uno-arena-local-observability-alertmanager
  webhookSink:
    enabled: true

prometheus:
  scrapeInterval: 30s
  evaluationInterval: 30s
  scrapeTimeout: 10s

grafana:
  existingAdminSecret: uno-arena-local-observability
  strategyType: Recreate
  preinstallDisabled: true
  goMemoryLimit: 256MiB
  dataEmptyDir: {medium: Memory, sizeLimit: 128Mi}

security:
  # The local-production foundations application owns namespace-wide strict mTLS.
  managePeerAuthentication: false
  networkPoliciesEnabled: false

postSyncEvidence:
  enabled: true

# Local production preserves the production topology and alert semantics while
# reducing scheduling reservations for a laptop-sized three-node kind cluster.
probes:
  readinessTimeoutSeconds: 10

resources:
  alloyLogs:
    requests: {cpu: 250m, memory: 32Mi}
    limits: {cpu: "2", memory: 512Mi}
  alloyOtlp:
    requests: {cpu: 250m, memory: 64Mi}
    limits: {cpu: "2", memory: 512Mi}
  loki:
    requests: {cpu: 100m, memory: 128Mi}
  tempo:
    requests: {cpu: 100m, memory: 128Mi}
    limits: {cpu: "2", memory: 1Gi}
  prometheus:
    requests: {cpu: 100m, memory: 128Mi}
  alertmanager:
    requests: {cpu: 25m, memory: 32Mi}
  redisExporter:
    requests: {cpu: 10m, memory: 16Mi}
  webhookSink:
    requests: {cpu: 5m, memory: 8Mi}
  kubeStateMetrics:
    requests: {cpu: 20m, memory: 32Mi}
  grafana:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: "1", memory: 512Mi}
