apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    unoarena.io/metrics-scrape: service
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
