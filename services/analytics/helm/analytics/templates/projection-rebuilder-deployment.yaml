{{- /*
  Analytics projection-rebuilder: same image as API; WORKER_ROLE=analytics-projection-rebuilder
  consumes analytics.projection.rebuild_requested (ADR-0039). HTTP-free — no ports/probes.
  Least privilege: ClickHouse + Kafka rebuild/DLQ/follow-up + three producer URLs + three
  scoped pair credentials only (never ops credential / Gateway secrets).
  Default/staging/production/kind keep enabled=false until live recovery proof.
*/ -}}
{{- if .Values.projectionRebuilder.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-projection-rebuilder
  labels:
    app: {{ .Release.Name }}-projection-rebuilder
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  replicas: {{ .Values.projectionRebuilder.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-projection-rebuilder
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-projection-rebuilder
        app.kubernetes.io/part-of: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: projection-rebuilder
          image: {{ include "analytics.image" . | quote }}
          imagePullPolicy: {{ include "analytics.imagePullPolicy" . }}
          env:
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: DEPLOYMENT_ENV
              value: {{ .Values.env.DEPLOYMENT_ENV | default "" | quote }}
            - name: WORKER_ROLE
              value: "analytics-projection-rebuilder"
            - name: CLICKHOUSE_URL
              value: {{ .Values.env.CLICKHOUSE_URL | quote }}
            - name: CLICKHOUSE_DB
              value: {{ .Values.env.CLICKHOUSE_DB | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.env.KAFKA_BROKERS | quote }}
            - name: ROOM_GAMEPLAY_URL
              value: {{ .Values.projectionRebuilder.env.ROOM_GAMEPLAY_URL | quote }}
            - name: TOURNAMENT_ORCHESTRATION_URL
              value: {{ .Values.projectionRebuilder.env.TOURNAMENT_ORCHESTRATION_URL | quote }}
            - name: RANKING_URL
              value: {{ .Values.projectionRebuilder.env.RANKING_URL | quote }}
            - name: KAFKA_PROJECTION_REBUILD_GROUP
              value: {{ .Values.projectionRebuilder.env.KAFKA_PROJECTION_REBUILD_GROUP | default "analytics-projection-rebuilder" | quote }}
            - name: KAFKA_PROJECTION_REBUILD_TOPIC
              value: {{ .Values.projectionRebuilder.env.KAFKA_PROJECTION_REBUILD_TOPIC | default "analytics.projection.rebuild_requested" | quote }}
            - name: KAFKA_PROJECTION_REBUILD_DLQ_TOPIC
              value: {{ .Values.projectionRebuilder.env.KAFKA_PROJECTION_REBUILD_DLQ_TOPIC | default "analytics.projection.rebuild_requested.analytics.dlq" | quote }}
            {{- /* Scoped pair credentials only — never inject ops credential. */ -}}
            {{- if and .Values.existingSecret .Values.projectionRebuilder.secretEnv }}
            {{- range $envName, $key := .Values.projectionRebuilder.secretEnv }}
            {{- if and $key (ne $key "") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
