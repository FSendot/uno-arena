# Local kind overlay for Analytics durable ClickHouse + Kafka ingestion.
kind: true

replicaCount: 1

image:
  repository: uno-arena/analytics
  tag: local
  digest: ""
  pullPolicy: IfNotPresent

env:
  SERVICE_NAME: analytics
  DEPLOYMENT_ENV: local
  CLICKHOUSE_URL: http://clickhouse.uno-arena.svc.cluster.local:8123
  CLICKHOUSE_DB: analytics
  KAFKA_BROKERS: kafka.uno-arena.svc.cluster.local:9092
  KAFKA_CONSUMER_GROUP: analytics
  KAFKA_TOPICS: room.gameplay.metrics,room.match.completed,tournament.match.assigned,tournament.match.result_recorded,tournament.players.advanced,tournament.round.completed,tournament.completed,ranking.player_rating_updated,ranking.leaderboard_snapshot_published
  KAFKA_MAX_ATTEMPTS: "5"
  KAFKA_MAX_PARTITION_WORKERS: "8"
  # Durable mode: no ANALYTICS_CAPABILITY_MODE; ClickHouse credentials from secret.

existingSecret: uno-arena-local-credentials
secretEnv:
  ANALYTICS_ROOM_CREDENTIAL: analytics-room-credential
  ANALYTICS_RANKING_CREDENTIAL: analytics-ranking-credential
  ANALYTICS_TOURNAMENT_CREDENTIAL: analytics-tournament-credential
  ANALYTICS_OPS_CREDENTIAL: analytics-ops-credential
  CLICKHOUSE_USER: analytics-runtime-user
  CLICKHOUSE_PASSWORD: analytics-runtime-password

projectionRebuilder:
  # Enabled only in kind after the live Kafka -> producer backfill -> ClickHouse
  # idempotency/lease/generation proof passed. Other overlays remain disabled.
  enabled: true
  env:
    ROOM_GAMEPLAY_URL: http://room-gameplay.uno-arena.svc.cluster.local:8080
    TOURNAMENT_ORCHESTRATION_URL: http://tournament-orchestration.uno-arena.svc.cluster.local:8080
    RANKING_URL: http://ranking.uno-arena.svc.cluster.local:8080
    KAFKA_PROJECTION_REBUILD_GROUP: analytics-projection-rebuilder
    KAFKA_PROJECTION_REBUILD_TOPIC: analytics.projection.rebuild_requested
    KAFKA_PROJECTION_REBUILD_DLQ_TOPIC: analytics.projection.rebuild_requested.analytics.dlq
  secretEnv:
    CLICKHOUSE_USER: analytics-runtime-user
    CLICKHOUSE_PASSWORD: analytics-runtime-password
    ANALYTICS_ROOM_CREDENTIAL: analytics-room-credential
    ANALYTICS_TOURNAMENT_CREDENTIAL: analytics-tournament-credential
    ANALYTICS_RANKING_CREDENTIAL: analytics-ranking-credential
