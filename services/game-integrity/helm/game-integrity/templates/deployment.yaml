apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: {{ include "game-integrity.image" . | quote }}
          imagePullPolicy: {{ include "game-integrity.imagePullPolicy" . }}
          ports:
            - containerPort: 8080
          env:
            {{- range $name, $val := .Values.env }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            {{- range $envName, $key := .Values.secretEnv }}
            {{- if and $key (ne $key "") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
