replicaCount: 1

env:
  DEPLOYMENT_ENV: staging
  IDENTITY_URL: http://identity.uno-arena.svc.cluster.local:8080
  ROOM_GAMEPLAY_URL: http://room-gameplay.uno-arena.svc.cluster.local:8080
  TOURNAMENT_URL: http://tournament-orchestration.uno-arena.svc.cluster.local:8080
  SPECTATOR_VIEW_URL: http://spectator-view.uno-arena.svc.cluster.local:8080
  RANKING_URL: http://ranking.uno-arena.svc.cluster.local:8080
  ANALYTICS_URL: http://analytics.uno-arena.svc.cluster.local:8080
  REDIS_URL: redis://redis.uno-arena.svc.cluster.local:6379/0
  # Staging: set GATEWAY_PLAYER_FEED_REDIS_URL + GATEWAY_SPECTATOR_REDIS_URL for durable Redis;
  # set KAFKA_BROKERS + KAFKA_SESSION_INVALIDATED_* for SessionInvalidated consumer.
  KAFKA_BROKERS: kafka.uno-arena.svc.cluster.local:9092
  KAFKA_CONSUMER_GROUP: gateway
  KAFKA_SESSION_INVALIDATED_TOPIC: identity.session.invalidated
  KAFKA_SESSION_INVALIDATED_DLQ_TOPIC: identity.session.invalidated.gateway.dlq
  GATEWAY_SESSION_INVALIDATION_TTL: "744h" # 31d

existingSecret: gateway-secrets
# Inherits secretEnv from values.yaml (explicit GATEWAY_*_SERVICE_CREDENTIAL outbound
# keys plus inbound producer credentials). Operators must provision matching values
# in gateway-secrets for each peer audience.
