apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: api
        unoarena.io/metrics-exposed: "true"
        unoarena.io/component: api
    spec:
      serviceAccountName: gateway
      automountServiceAccountToken: false
      containers:
        - name: {{ .Release.Name }}
          image: {{ include "gateway.image" . | quote }}
          imagePullPolicy: {{ include "gateway.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            - name: SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            {{- range $name, $val := .Values.env }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            {{- range $envName, $key := .Values.secretEnv }}
            {{- if and $key (ne $key "") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
