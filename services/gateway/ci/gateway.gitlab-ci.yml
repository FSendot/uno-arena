test:gateway:
  stage: test
  image: golang:1.22-alpine
  script:
    - cd services/gateway/src && go vet ./... && go test ./...
  rules:
    - changes:
        - services/gateway/**
        - ci/templates/**

build:gateway:
  stage: build
  needs: ["test:gateway"]
  script:
    - docker build -t $CI_REGISTRY_IMAGE/gateway:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA services/gateway/
  rules:
    - changes:
        - services/gateway/**
        - ci/templates/**

deliver:gateway:
  stage: deliver
  needs: ["build:gateway"]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/gateway:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    - |
      CHART_VERSION=0.1.$CI_PIPELINE_IID
      helm package services/gateway/helm/gateway --version $CHART_VERSION --app-version $CI_COMMIT_SHORT_SHA
      curl --fail-with-body --request POST \
        --user gitlab-ci-token:$CI_JOB_TOKEN \
        --form "chart=@gateway-$CHART_VERSION.tgz" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${CI_COMMIT_REF_SLUG}/charts"
  rules:
    - changes:
        - services/gateway/**
        - ci/templates/**

deploy-staging:gateway:
  stage: deploy-staging
  needs: ["deliver:gateway"]
  when: manual
  script:
    - echo "deploy-staging for gateway is stubbed for this checkpoint"
  rules:
    - changes:
        - services/gateway/**
        - ci/templates/**
