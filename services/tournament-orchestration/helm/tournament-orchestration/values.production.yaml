replicaCount: 2

env:
  DEPLOYMENT_ENV: production
  ROOM_GAMEPLAY_URL: http://room-gameplay.uno-arena.svc.cluster.local:8080
  KAFKA_BROKERS: kafka.uno-arena.svc.cluster.local:9092
  KAFKA_CONSUMER_GROUP: tournament-orchestration
  KAFKA_MATCH_COMPLETED_TOPIC: room.match.completed
  KAFKA_MATCH_COMPLETED_DLQ_TOPIC: room.match.completed.tournament-orchestration.dlq
  KAFKA_ROOM_RUNTIME_READY_TOPIC: room.runtime.ready
  KAFKA_ROOM_RUNTIME_READY_DLQ_TOPIC: room.runtime.ready.tournament-orchestration.dlq
  REDIS_URL: redis://redis.uno-arena.svc.cluster.local:6379/7

provisioningWorker:
  enabled: false
  replicaCount: 1

seedingWorker:
  enabled: false
  replicaCount: 1

completionWorker:
  enabled: false
  replicaCount: 1

existingSecret: tournament-orchestration-secrets

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

topologySpread:
  enabled: true
  maxSkew: 1
  whenUnsatisfiable: DoNotSchedule

nodeSelector:
  node-role.kubernetes.io/worker: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

imagePullSecrets:
  - name: gitlab-registry
