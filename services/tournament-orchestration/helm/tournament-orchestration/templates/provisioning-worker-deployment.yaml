{{- /*
  BLOCKED: tournament-orchestration binary does not implement a
  WORKER_ROLE=tournament-provisioning loop, and production Kafka/outbox provisioning
  adapters are absent. Default/staging/production keep provisioningWorker.enabled=false
  so Helm does not launch a duplicate HTTP server.
*/ -}}
{{- if .Values.provisioningWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-provisioning-worker
  labels:
    app: {{ .Release.Name }}-provisioning-worker
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-provisioning-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-provisioning-worker
        app.kubernetes.io/part-of: {{ .Release.Name }}
    spec:
      containers:
        - name: provisioning-worker
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          env:
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: WORKER_ROLE
              value: "tournament-provisioning"
            - name: ROOM_GAMEPLAY_URL
              value: {{ .Values.env.ROOM_GAMEPLAY_URL | quote }}
            {{- if .Values.existingSecret }}
            - name: TOURNAMENT_INTERNAL_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | quote }}
                  key: {{ index .Values.secretEnv "TOURNAMENT_INTERNAL_CREDENTIAL" | quote }}
            - name: SERVICE_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | quote }}
                  key: {{ index .Values.secretEnv "SERVICE_CREDENTIAL" | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
