apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    unoarena.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        app.kubernetes.io/name: tournament-orchestration
        unoarena.io/component: api
        unoarena.io/metrics-exposed: "true"
    spec:
      serviceAccountName: {{ .Release.Name }}
      automountServiceAccountToken: false
      containers:
        - name: {{ .Release.Name }}
          image: {{ include "tournament-orchestration.image" . | quote }}
          imagePullPolicy: {{ include "tournament-orchestration.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            {{- include "tournament-orchestration.telemetryEnv" (dict "root" . "component" "api") | nindent 12 }}
            {{- range $name, $val := .Values.env }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            {{- range $envName, $key := .Values.secretEnv }}
            {{- if and $key (ne $key "") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
