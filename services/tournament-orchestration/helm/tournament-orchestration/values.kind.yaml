# Local kind overlay for Tournament Orchestration durable Postgres.
# Redis bracket projection is wired (REDIS_URL DB 7). Debezium CDC delivery remains PENDING.
kind: true

replicaCount: 1

image:
  repository: uno-arena/tournament-orchestration
  tag: local
  digest: ""
  pullPolicy: IfNotPresent

env:
  SERVICE_NAME: tournament-orchestration
  DEPLOYMENT_ENV: local
  ROOM_GAMEPLAY_URL: http://room-gameplay.uno-arena.svc.cluster.local:8080
  KAFKA_BROKERS: kafka.uno-arena.svc.cluster.local:9092
  KAFKA_CONSUMER_GROUP: tournament-orchestration
  KAFKA_MATCH_COMPLETED_TOPIC: room.match.completed
  KAFKA_MATCH_COMPLETED_DLQ_TOPIC: room.match.completed.tournament-orchestration.dlq
  KAFKA_ROOM_RUNTIME_READY_TOPIC: room.runtime.ready
  KAFKA_ROOM_RUNTIME_READY_DLQ_TOPIC: room.runtime.ready.tournament-orchestration.dlq
  # Disposable Redis bracket projection (kind DB 7).
  REDIS_URL: redis://redis.uno-arena.svc.cluster.local:6379/7
  # Durable mode: no TOURNAMENT_CAPABILITY_MODE; DATABASE_URL from secret.
  # Provisioning worker enabled below (2 replicas exercise SKIP LOCKED).
  # Seeding worker enabled below (2 replicas exercise SKIP LOCKED).
  # Completion worker enabled below (2 replicas exercise idempotent CompleteRound).

provisioningWorker:
  enabled: true
  replicaCount: 2

seedingWorker:
  enabled: true
  replicaCount: 2

completionWorker:
  enabled: true
  replicaCount: 2

existingSecret: uno-arena-local-credentials
secretEnv:
  TOURNAMENT_INTERNAL_CREDENTIAL: tournament-internal-credential
  SERVICE_CREDENTIAL: tournament-internal-credential
  ROOM_SERVICE_CREDENTIAL: room-service-credential
  DATABASE_URL: tournament-database-url
  TOURNAMENT_BRACKET_CURSOR_SECRET: tournament-bracket-cursor-secret
  TOURNAMENT_ANALYTICS_BACKFILL_SERVICE_CREDENTIAL: analytics-tournament-credential
  TOURNAMENT_ANALYTICS_BACKFILL_CURSOR_SECRET: tournament-analytics-backfill-cursor-secret
