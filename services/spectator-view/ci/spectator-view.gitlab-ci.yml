test:spectator-view:
  stage: test
  image: golang:1.26.5-alpine3.24
  script:
    - cd services/spectator-view/src && go vet ./... && go test ./...
  rules: &spectator_view_validation_rules
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - services/spectator-view/**
        - ci/templates/**
        - .dockerignore
        - services/room-gameplay/contracts/**
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/spectator-view/**
        - ci/templates/**
        - .dockerignore
        - services/room-gameplay/contracts/**
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && ($RUN_SERVICE == null || $RUN_SERVICE == "" || $RUN_SERVICE == "all" || $RUN_SERVICE == "spectator-view")'

build:spectator-view:
  stage: build
  needs: ["test:spectator-view"]
  script:
    - docker build -f services/spectator-view/Dockerfile -t $CI_REGISTRY_IMAGE/spectator-view:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA .
  rules: *spectator_view_validation_rules

deliver:spectator-view:
  stage: deliver
  needs: ["build:spectator-view"]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/spectator-view:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    - |
      CHART_VERSION=0.1.$CI_PIPELINE_IID
      helm package services/spectator-view/helm/spectator-view --version $CHART_VERSION --app-version $CI_COMMIT_SHORT_SHA
      curl --fail-with-body --request POST \
        --user gitlab-ci-token:$CI_JOB_TOKEN \
        --form "chart=@spectator-view-$CHART_VERSION.tgz" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${CI_COMMIT_REF_SLUG}/charts"
  rules: &spectator_view_main_push_rules
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/spectator-view/**
        - ci/templates/**
        - .dockerignore
        - services/room-gameplay/contracts/**
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && ($RUN_SERVICE == null || $RUN_SERVICE == "" || $RUN_SERVICE == "all" || $RUN_SERVICE == "spectator-view")'

deploy-staging:spectator-view:
  stage: deploy-staging
  needs: ["deliver:spectator-view"]
  when: manual
  script:
    - echo "deploy-staging for spectator-view is stubbed for this checkpoint"
  rules: *spectator_view_main_push_rules
