# Simulator overlay: render after values.production.yaml.
env:
  DEPLOYMENT_ENV: local-production

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

healthProbes:
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 6

topologySpread:
  enabled: true
  maxSkew: 1
  whenUnsatisfiable: DoNotSchedule

nodeSelector:
  node-role.kubernetes.io/worker: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

imagePullSecrets:
  - name: gitlab-registry

