# Local kind overlay for Spectator View durable Redis projection + SSE.
# Kafka consumer for room.spectator-safe.events is wired via franz-go.
# HTTP internal ingest remains a test/ops bridge only.
# Projection rebuilder is enabled only in kind after the live
# request→snapshot→fenced swap→quarantine release proof passed (ADR-0039).
kind: true

replicaCount: 1

image:
  repository: uno-arena/spectator-view
  tag: local
  digest: ""
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

healthProbes:
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 6

env:
  SERVICE_NAME: spectator-view
  DEPLOYMENT_ENV: local
  # Dedicated Redis DB 5 — distinct from Room timers (DB 2) and other contexts.
  REDIS_URL: redis://redis.uno-arena.svc.cluster.local:6379/5
  SPECTATOR_REDIS_KEY_PREFIX: "spectator:"
  # Approximate Redis stream MAXLEN (~) for local proof; snapshot covers trim.
  SPECTATOR_REDIS_STREAM_MAXLEN: "1024"
  KAFKA_BROKERS: kafka.uno-arena.svc.cluster.local:9092
  KAFKA_CONSUMER_GROUP: spectator-view
  KAFKA_SPECTATOR_SAFE_TOPIC: room.spectator-safe.events
  KAFKA_SPECTATOR_SAFE_DLQ_TOPIC: room.spectator-safe.events.spectator-view.dlq
  # Durable mode: no SPECTATOR_CAPABILITY_MODE; credential from secret.

existingSecret: uno-arena-local-credentials
secretEnv:
  SPECTATOR_VIEW_INTERNAL_CREDENTIAL: spectator-view-internal-credential

projectionRebuilder:
  enabled: true
  replicaCount: 1
  env:
    ROOM_GAMEPLAY_URL: http://room-gameplay.uno-arena.svc.cluster.local:8080
    KAFKA_PROJECTION_REBUILD_GROUP: spectator-view-projection-rebuilder
    KAFKA_PROJECTION_REBUILD_TOPIC: spectator.projection.rebuild_requested
    KAFKA_PROJECTION_REBUILD_DLQ_TOPIC: spectator.projection.rebuild_requested.spectator-view.dlq
  secretEnv:
    ROOM_SPECTATOR_RECOVERY_SERVICE_CREDENTIAL: room-spectator-recovery-service-credential
