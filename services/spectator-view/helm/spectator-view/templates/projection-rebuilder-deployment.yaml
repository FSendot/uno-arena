{{- /*
  BLOCKED: spectator-view binary does not implement a
  WORKER_ROLE=spectator-projection-rebuilder loop, and production Kafka consumer /
  rebuild adapters are absent. Default/staging/production/kind keep
  projectionRebuilder.enabled=false so Helm does not launch a duplicate HTTP server.
  Kafka ingestion for room.spectator-safe.events remains PENDING.
*/ -}}
{{- if .Values.projectionRebuilder.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-projection-rebuilder
  labels:
    app: {{ .Release.Name }}-projection-rebuilder
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-projection-rebuilder
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-projection-rebuilder
        app.kubernetes.io/part-of: {{ .Release.Name }}
    spec:
      containers:
        - name: projection-rebuilder
          image: {{ include "spectator-view.image" . | quote }}
          imagePullPolicy: {{ include "spectator-view.imagePullPolicy" . }}
          env:
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: WORKER_ROLE
              value: "spectator-projection-rebuilder"
            {{- if .Values.existingSecret }}
            - name: SPECTATOR_VIEW_INTERNAL_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | quote }}
                  key: {{ index .Values.secretEnv "SPECTATOR_VIEW_INTERNAL_CREDENTIAL" | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
