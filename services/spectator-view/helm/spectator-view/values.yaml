replicaCount: 1

image:
  repository: registry.gitlab.com/group/uno-arena/spectator-view
  digest: ""

env:
  SERVICE_NAME: spectator-view
  DEPLOYMENT_ENV: staging
  REDIS_URL: redis://redis:6379/5
  # Kafka brokers/group/topics are environment-specific (see values.kind / staging / production).
  SPECTATOR_REDIS_KEY_PREFIX: "spectator:"
  # Approximate Redis stream MAXLEN (~); trimmed history falls back to snapshot.
  SPECTATOR_REDIS_STREAM_MAXLEN: "1024"

# Default/staging/production keep disabled (ADR-0013 / ADR-0039).
projectionRebuilder:
  enabled: false
  replicaCount: 1
  env:
    ROOM_GAMEPLAY_URL: http://room-gameplay:8080
    KAFKA_PROJECTION_REBUILD_GROUP: spectator-view-projection-rebuilder
    KAFKA_PROJECTION_REBUILD_TOPIC: spectator.projection.rebuild_requested
    KAFKA_PROJECTION_REBUILD_DLQ_TOPIC: spectator.projection.rebuild_requested.spectator-view.dlq
  secretEnv:
    ROOM_SPECTATOR_RECOVERY_SERVICE_CREDENTIAL: room-spectator-recovery-service-credential

# Cross-chart: spectator-view-internal-credential == gateway gateway-spectator-service-credential
#              == room spectator-view-internal-credential secret value (Room→Spectator).
existingSecret: spectator-view-secrets
secretEnv:
  SPECTATOR_VIEW_INTERNAL_CREDENTIAL: spectator-view-internal-credential

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

healthProbes:
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

# Primary HTTP API rollout contract. Workers/controllers keep their chart-specific
# fixed scaling and are never targeted by the API HPA.
rollout:
  maxUnavailable: 0
  maxSurge: 1

startupProbe:
  enabled: true
  path: /ready
  periodSeconds: 2
  timeoutSeconds: 3
  failureThreshold: 30

preStop:
  enabled: true
  sleepSeconds: 5

terminationGracePeriodSeconds: 30

topologySpread:
  enabled: false
  maxSkew: 1
  whenUnsatisfiable: DoNotSchedule

nodeSelector: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

# Attached to every workload ServiceAccount rendered by this chart.
imagePullSecrets: []
