replicaCount: 1

image:
  repository: registry.gitlab.com/group/uno-arena/spectator-view
  digest: ""

env:
  SERVICE_NAME: spectator-view
  REDIS_URL: redis://redis:6379/5
  # KAFKA_BROKERS omitted until Kafka consumer slice; HTTP internal ingest is test/ops bridge.
  SPECTATOR_REDIS_KEY_PREFIX: "spectator:"
  # Approximate Redis stream MAXLEN (~); trimmed history falls back to snapshot.
  SPECTATOR_REDIS_STREAM_MAXLEN: "1024"

# BLOCKED: binary has no WORKER_ROLE=spectator-projection-rebuilder loop; Kafka rebuild absent.
projectionRebuilder:
  enabled: false

# Cross-chart: spectator-view-internal-credential == gateway gateway-spectator-service-credential
#              == room spectator-view-internal-credential secret value (Room→Spectator).
existingSecret: spectator-view-secrets
secretEnv:
  SPECTATOR_VIEW_INTERNAL_CREDENTIAL: spectator-view-internal-credential

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
