replicaCount: 2

env:
  DEPLOYMENT_ENV: production
  REDIS_URL: redis://redis.uno-arena.svc.cluster.local:6379/1
  KAFKA_BROKERS: kafka.uno-arena.svc.cluster.local:9092
  OIDC_ALLOW_HTTP: "false"
  IDENTITY_ALLOW_PASSWORD_LOGIN: "false"
  IDENTITY_OIDC_DIRECT_GRANT: "false"
  IDENTITY_ALLOW_TEST_PROVISIONING: "false"

existingSecret: identity-secrets

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

topologySpread:
  enabled: true
  maxSkew: 1
  whenUnsatisfiable: DoNotSchedule

nodeSelector:
  node-role.kubernetes.io/worker: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

imagePullSecrets:
  - name: gitlab-registry
