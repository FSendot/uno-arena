test:identity:
  stage: test
  image: golang:1.22-alpine
  script:
    - cd services/identity/src && go vet ./... && go test ./...
  rules: &identity_validation_rules
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - services/identity/**
        - ci/templates/**
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/identity/**
        - ci/templates/**
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && ($RUN_SERVICE == null || $RUN_SERVICE == "" || $RUN_SERVICE == "all" || $RUN_SERVICE == "identity")'

build:identity:
  stage: build
  needs: ["test:identity"]
  script:
    - docker build -t $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA services/identity/
  rules: *identity_validation_rules

deliver:identity:
  stage: deliver
  needs: ["build:identity"]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    - |
      IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
        $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA | cut -d@ -f2)
      echo "IMAGE_DIGEST=$IMAGE_DIGEST" > $CI_PROJECT_DIR/deliver.env
    - |
      CHART_VERSION=0.1.$CI_PIPELINE_IID
      helm package services/identity/helm/identity --version $CHART_VERSION --app-version $CI_COMMIT_SHORT_SHA
      curl --fail-with-body --request POST \
        --user gitlab-ci-token:$CI_JOB_TOKEN \
        --form "chart=@identity-$CHART_VERSION.tgz" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${CI_COMMIT_REF_SLUG}/charts"
  artifacts:
    reports:
      dotenv: $CI_PROJECT_DIR/deliver.env
  rules: &identity_deliver_rules
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/identity/**
        - ci/templates/**
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && ($RUN_SERVICE == null || $RUN_SERVICE == "" || $RUN_SERVICE == "all" || $RUN_SERVICE == "identity")'

deploy-staging:identity:
  stage: deploy-staging
  needs:
    - job: deliver:identity
      artifacts: true
  script:
    - helm repo add --force-update --username gitlab-ci-token --password $CI_JOB_TOKEN uno-arena-$CI_COMMIT_REF_SLUG ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/${CI_COMMIT_REF_SLUG}
    - helm repo update
    - >
      helm upgrade --install identity uno-arena-$CI_COMMIT_REF_SLUG/identity
      --version 0.1.$CI_PIPELINE_IID
      --namespace staging
      --create-namespace
      --values services/identity/helm/identity/values.staging.yaml
      --set image.repository=$CI_REGISTRY_IMAGE/identity
      --set image.digest=$IMAGE_DIGEST
      --force-conflicts
    - kubectl rollout status deployment/identity -n staging --timeout=120s
  rules: &identity_main_push_rules
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/identity/**
        - ci/templates/**
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && ($RUN_SERVICE == null || $RUN_SERVICE == "" || $RUN_SERVICE == "all" || $RUN_SERVICE == "identity")'

integration-staging:identity:
  stage: integration-staging
  image: alpine:3.19
  needs: ["deploy-staging:identity"]
  retry: 1
  variables:
    UNOARENA_API_URL: $STAGING_IDENTITY_URL
  script:
    - if command -v apk >/dev/null; then apk add --no-cache bash curl; fi
    - install -m 0755 client-checkpoint/bin/unoarena "$CI_PROJECT_DIR/unoarena"
    - export PATH="$CI_PROJECT_DIR:$PATH"
    - bash devops-checkpoint/smoke-test/run-smoke-test.sh
  rules: *identity_main_push_rules
