test:identity:
  stage: test
  image: golang:1.22-alpine
  script:
    - cd services/identity/src && go vet ./... && go test ./...
  rules:
    - changes:
        - services/identity/**
        - ci/templates/**

build:identity:
  stage: build
  needs: ["test:identity"]
  script:
    - docker build -t $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA services/identity/
  rules:
    - changes:
        - services/identity/**
        - ci/templates/**

deliver:identity:
  stage: deliver
  needs: ["build:identity"]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    - |
      IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
        $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA | cut -d@ -f2)
      echo "IMAGE_DIGEST=$IMAGE_DIGEST" > $CI_PROJECT_DIR/deliver.env
  artifacts:
    reports:
      dotenv: $CI_PROJECT_DIR/deliver.env
  rules:
    - changes:
        - services/identity/**
        - ci/templates/**

deploy-staging:identity:
  stage: deploy-staging
  needs:
    - job: deliver:identity
      artifacts: true
  script:
    - helm upgrade --install identity services/identity/helm/identity --namespace staging --create-namespace --values services/identity/helm/identity/values.staging.yaml --set image.repository=$CI_REGISTRY_IMAGE/identity --set image.digest=$IMAGE_DIGEST
    - kubectl rollout status deployment/identity -n staging --timeout=120s
  rules:
    - changes:
        - services/identity/**
        - ci/templates/**

integration-staging:identity:
  stage: integration-staging
  image: alpine:3.19
  needs: ["deploy-staging:identity"]
  retry: 1
  variables:
    UNOARENA_API_URL: $STAGING_IDENTITY_URL
  script:
    - apk add --no-cache jq bash
    - cp $UNOARENA_CLI_BIN /usr/local/bin/unoarena && chmod +x /usr/local/bin/unoarena
    - bash devops-checkpoint/smoke-test/run-smoke-test.sh
  rules:
    - changes:
        - services/identity/**
        - ci/templates/**

deliver-production:identity:
  stage: deliver-production
  needs:
    - job: deliver:identity
      artifacts: true
  when: manual
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    - docker tag $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE/identity:$CI_COMMIT_TAG

deploy-production:identity:
  stage: deploy-production
  needs:
    - job: deliver-production:identity
    - job: deliver:identity
      artifacts: true
  when: manual
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - helm upgrade --install identity services/identity/helm/identity --namespace production --create-namespace --values services/identity/helm/identity/values.production.yaml --set image.repository=$CI_REGISTRY_IMAGE/identity --set image.digest=$IMAGE_DIGEST
    - kubectl rollout status deployment/identity -n production --timeout=120s
