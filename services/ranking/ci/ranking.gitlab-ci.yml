test:ranking:
  stage: test
  image: golang:1.26.5-alpine3.24
  script:
    - cd services/ranking/src && go vet ./... && go test ./...
  rules: &ranking_validation_rules
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - services/ranking/**
        - ci/templates/**
        - .dockerignore
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/ranking/**
        - ci/templates/**
        - .dockerignore
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && ($RUN_SERVICE == null || $RUN_SERVICE == "" || $RUN_SERVICE == "all" || $RUN_SERVICE == "ranking")'

build:ranking:
  stage: build
  needs: ["test:ranking"]
  script:
    - docker build -f services/ranking/Dockerfile -t $CI_REGISTRY_IMAGE/ranking:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA .
  rules: *ranking_validation_rules

deliver:ranking:
  stage: deliver
  needs: ["build:ranking"]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/ranking:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    - |
      CHART_VERSION=0.1.$CI_PIPELINE_IID
      helm package services/ranking/helm/ranking --version $CHART_VERSION --app-version $CI_COMMIT_SHORT_SHA
      curl --fail-with-body --request POST \
        --user gitlab-ci-token:$CI_JOB_TOKEN \
        --form "chart=@ranking-$CHART_VERSION.tgz" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${CI_COMMIT_REF_SLUG}/charts"
  rules: &ranking_main_push_rules
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/ranking/**
        - ci/templates/**
        - .dockerignore
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main" && ($RUN_SERVICE == null || $RUN_SERVICE == "" || $RUN_SERVICE == "all" || $RUN_SERVICE == "ranking")'

deploy-staging:ranking:
  stage: deploy-staging
  needs: ["deliver:ranking"]
  when: manual
  script:
    - echo "deploy-staging for ranking is stubbed for this checkpoint"
  rules: *ranking_main_push_rules
