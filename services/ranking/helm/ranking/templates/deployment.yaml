apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        app.kubernetes.io/name: ranking
        app.kubernetes.io/component: api
        unoarena.io/component: api
        unoarena.io/metrics-exposed: "true"
    spec:
      serviceAccountName: ranking
      automountServiceAccountToken: false
      containers:
        - name: {{ .Release.Name }}
          image: {{ include "ranking.image" . | quote }}
          imagePullPolicy: {{ include "ranking.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            {{- range $name, $val := .Values.env }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            - name: TELEMETRY_MODE
              value: "required"
            - name: SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: UNOARENA_COMPONENT
              value: "api"
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy-otlp.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.1"
            - name: OTEL_GO_X_OBSERVABILITY
              value: "true"
            - name: METRICS_ADDR
              value: ":9090"
            {{- if .Values.existingSecret }}
            {{- range $envName, $key := .Values.secretEnv }}
            {{- if and $key (ne $key "") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
