replicaCount: 1

image:
  repository: registry.gitlab.com/group/uno-arena/ranking
  digest: ""

env:
  SERVICE_NAME: ranking
  REDIS_URL: redis://redis:6379/4
  KAFKA_BROKERS: kafka:9092

# Cross-chart: ranking-internal-credential == room ranking-internal-credential secret value
#              (Room→Ranking GameCompleted bridge). Distinct from analytics-ranking-credential.
existingSecret: ranking-secrets
secretEnv:
  RANKING_INTERNAL_CREDENTIAL: ranking-internal-credential
  DATABASE_URL: database-url

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
