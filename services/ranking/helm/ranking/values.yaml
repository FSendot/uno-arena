replicaCount: 1

image:
  repository: registry.gitlab.com/group/uno-arena/ranking
  digest: ""

env:
  SERVICE_NAME: ranking
  DEPLOYMENT_ENV: staging
  REDIS_URL: redis://redis:6379/4
  KAFKA_BROKERS: kafka:9092
  KAFKA_CONSUMER_GROUP: ranking
  KAFKA_GAME_COMPLETED_TOPIC: room.game.completed
  KAFKA_GAME_COMPLETED_DLQ_TOPIC: room.game.completed.ranking.dlq
  KAFKA_PLAYERS_ADVANCED_TOPIC: tournament.players.advanced
  KAFKA_PLAYERS_ADVANCED_DLQ_TOPIC: tournament.players.advanced.ranking.dlq
  KAFKA_TOURNAMENT_COMPLETED_TOPIC: tournament.completed
  KAFKA_TOURNAMENT_COMPLETED_DLQ_TOPIC: tournament.completed.ranking.dlq
  KAFKA_PLAYER_RATING_UPDATED_TOPIC: ranking.player_rating_updated
  KAFKA_PLAYER_RATING_UPDATED_DLQ_TOPIC: ranking.player_rating_updated.ranking.dlq

# Cross-chart: ranking-internal-credential == room ranking-internal-credential secret value
#              (Room→Ranking GameCompleted bridge). Distinct from analytics-ranking-credential.
# RANKING_ANALYTICS_BACKFILL_SERVICE_CREDENTIAL is Analytics projection-rebuilder-only
# (same secret value as analytics-ranking-credential pair; no Gateway fallback).
# RANKING_ANALYTICS_BACKFILL_CURSOR_SECRET is API-only opaque keyset MAC (not snapshotter).
existingSecret: ranking-secrets
secretEnv:
  RANKING_INTERNAL_CREDENTIAL: ranking-internal-credential
  DATABASE_URL: database-url
  RANKING_LEADERBOARD_CURSOR_SECRET: ranking-leaderboard-cursor-secret
  RANKING_ANALYTICS_BACKFILL_SERVICE_CREDENTIAL: analytics-ranking-credential
  RANKING_ANALYTICS_BACKFILL_CURSOR_SECRET: ranking-analytics-backfill-cursor-secret

# ADR-0038: same image, separate Deployment. DB-only snapshotter (no Kafka/Redis/HTTP).
# Snapshotter template injects only DATABASE_URL (+ SERVICE_NAME/DEPLOYMENT_ENV/WORKER_ROLE).
# Backfill cursor/service credentials must never be injected into the snapshotter.
leaderboardSnapshotterWorker:
  enabled: false
  replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

healthProbes:
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
