replicaCount: 1

image:
  repository: registry.gitlab.com/group/uno-arena/room-gameplay
  digest: ""

# Peer URLs use Service port 8080 (cluster DNS). See README credential matrix.
env:
  SERVICE_NAME: room-gameplay
  GATEWAY_URL: http://gateway:8080
  IDENTITY_URL: http://identity:8080
  SPECTATOR_VIEW_URL: http://spectator-view:8080
  RANKING_URL: http://ranking:8080
  ANALYTICS_URL: http://analytics:8080
  TOURNAMENT_URL: http://tournament-orchestration:8080
  GAME_INTEGRITY_URL: http://game-integrity:8080
  REDIS_URL: redis://redis:6379/2
  KAFKA_BROKERS: kafka:9092
  # Durable mode when DATABASE_URL is set (secret). Capability mode remains
  # ROOM_CAPABILITY_MODE for offline stacks. The Room process only appends its
  # outboxes; external Kafka Connect and Debezium Server pipelines deliver them.

# Timer worker is enabled by the kind overlay. Other environments opt in only
# after their independent worker operations are provisioned; it is not a CDC relay.
timerWorker:
  enabled: false

# Bounded GI-success/local-commit repair worker. It owns no HTTP routes and
# receives only Room Postgres/Redis plus Game Integrity credentials.
integrityReconciler:
  enabled: false
  replicaCount: 2
  claimBatch: 32
  leaseSeconds: 60
  intervalMillis: 2000

# Durable Kubernetes topology: the stable router and leaderless controller are
# deployments; active Rooms are controller-created bare Pods only.
topology:
  enabled: true
  controller:
    replicaCount: 2
    dbPoolMaxConns: 4
    claimBatch: 16
    concurrency: 4
    readinessTimeoutSeconds: 60
  runtime:
    mutationQueueCapacity: 16
  pgbouncer:
    enabled: true
    image: edoburu/pgbouncer:v1.24.1-p1@sha256:3db3d7223e93af52b4116f642951a1a5fa44702a88c2a59cf7562cac19320c9e
    replicaCount: 2
    poolMode: transaction
    maxClientConn: 10000
    defaultPoolSize: 16
    reservePoolSize: 4
    authType: scram-sha-256
    tls:
      enabled: false
      secretName: ""
      caKey: ca.crt
      certKey: tls.crt
      privateKeyKey: tls.key
      clientMode: require
      serverMode: verify-full
    mesh:
      enforceStrictMTLS: false

existingSecret: room-gameplay-secrets
# Cross-chart equality (secret *values* must match; keys stay chart-local — no hardcoded secrets):
#   room-service-credential          == gateway gateway-room-service-credential (Gateway→Room)
#   room-to-gateway-credential       == gateway gateway-room-credential (Room→Gateway)
#   room-identity-credential         == identity identity-internal-credential (Room→Identity)
#   spectator-view-internal-credential == spectator-view chart (Room→Spectator)
#   ranking-internal-credential      == ranking chart (Room→Ranking)
#   analytics-room-credential        == analytics chart (Room↔Analytics pair)
#   tournament-internal-credential   == tournament chart (Room→Tournament)
#   game-integrity-internal-credential == game-integrity chart (Room→GI)
# Producer scope: ROOM_TIMER_SERVICE_CREDENTIAL is Room-timer-only (not Gateway).
# ROOM_SPECTATOR_RECOVERY_SERVICE_CREDENTIAL is Spectator projection-rebuilder-only.
# ROOM_ANALYTICS_BACKFILL_SERVICE_CREDENTIAL is Analytics projection-rebuilder-only
# (same secret value as analytics-room-credential pair; no Gateway fallback).
# ROOM_ANALYTICS_BACKFILL_CURSOR_SECRET is API-only opaque keyset MAC (not timer worker).
# ROOM_PUBLIC_LIST_CURSOR_SECRET is API-only opaque keyset MAC for public room listing (not timer worker).
secretEnv:
  SERVICE_CREDENTIAL: room-service-credential
  ROOM_SERVICE_CREDENTIAL: room-service-credential
  ROOM_TIMER_SERVICE_CREDENTIAL: room-timer-service-credential
  ROOM_SPECTATOR_RECOVERY_SERVICE_CREDENTIAL: room-spectator-recovery-service-credential
  ROOM_ANALYTICS_BACKFILL_SERVICE_CREDENTIAL: analytics-room-credential
  ROOM_ANALYTICS_BACKFILL_CURSOR_SECRET: room-analytics-backfill-cursor-secret
  ROOM_PUBLIC_LIST_CURSOR_SECRET: room-public-list-cursor-secret
  GATEWAY_SERVICE_CREDENTIAL: room-to-gateway-credential
  IDENTITY_SERVICE_CREDENTIAL: room-identity-credential
  ROOM_IDENTITY_CREDENTIAL: room-identity-credential
  SPECTATOR_VIEW_SERVICE_CREDENTIAL: spectator-view-internal-credential
  RANKING_SERVICE_CREDENTIAL: ranking-internal-credential
  ANALYTICS_SERVICE_CREDENTIAL: analytics-room-credential
  TOURNAMENT_SERVICE_CREDENTIAL: tournament-internal-credential
  GAME_INTEGRITY_INTERNAL_CREDENTIAL: game-integrity-internal-credential
  GAME_INTEGRITY_AUDIT_CREDENTIAL: game-integrity-audit-credential
  DATABASE_URL: database-url
  ROOM_RUNTIME_ROUTER_CREDENTIAL: room-runtime-router-credential
  ROOM_PGBOUNCER_URL: room-pgbouncer-database-url
  ROOM_PGBOUNCER_USERLIST: room-pgbouncer-userlist

# The controller resolves only its own database credential. Runtime credentials
# remain SecretKeyRef names until the controller writes the dedicated pod spec.
controllerSecretEnv:
  DATABASE_URL: database-url
runtimeSecretEnv:
  ROOM_RUNTIME_ROUTER_CREDENTIAL: room-runtime-router-credential
  IDENTITY_SERVICE_CREDENTIAL: room-identity-credential
  GAME_INTEGRITY_INTERNAL_CREDENTIAL: game-integrity-internal-credential
  GAME_INTEGRITY_AUDIT_CREDENTIAL: game-integrity-audit-credential
  ROOM_PGBOUNCER_URL: room-pgbouncer-database-url

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
