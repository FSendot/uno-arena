replicaCount: 2

env:
  DEPLOYMENT_ENV: production
  GATEWAY_URL: http://gateway.uno-arena.svc.cluster.local:8080
  IDENTITY_URL: http://identity.uno-arena.svc.cluster.local:8080
  SPECTATOR_VIEW_URL: http://spectator-view.uno-arena.svc.cluster.local:8080
  RANKING_URL: http://ranking.uno-arena.svc.cluster.local:8080
  ANALYTICS_URL: http://analytics.uno-arena.svc.cluster.local:8080
  TOURNAMENT_URL: http://tournament-orchestration.uno-arena.svc.cluster.local:8080
  GAME_INTEGRITY_URL: http://game-integrity.uno-arena.svc.cluster.local:8080
  REDIS_URL: redis://redis.uno-arena.svc.cluster.local:6379/2
  KAFKA_BROKERS: kafka.uno-arena.svc.cluster.local:9092
  # Room appends both outboxes in Postgres. Environment-owned Kafka Connect and
  # Debezium Server pipelines are required separately; this chart deploys neither.

timerWorker:
  enabled: false

existingSecret: room-gameplay-secrets

topology:
  controller:
    # At the one-second bounded reconcile cadence, 32 replicas x 64 claims
    # provides admission headroom for a 100k-room burst inside one minute;
    # API-server and scheduler load tests must validate the final budget.
    replicaCount: 32
    claimBatch: 64
    concurrency: 16
    readinessTimeoutSeconds: 90
  pgbouncer:
    # Initial production envelope: six PgBouncer processes admit up to 300k
    # lazy runtime clients while bounding this database/user pair to at most
    # 240 backend connections. Load tests and Postgres connection budgets own
    # the final values; this is not a target-throughput claim.
    replicaCount: 6
    maxClientConn: 50000
    defaultPoolSize: 32
    reservePoolSize: 8
    authType: scram-sha-256
    tls:
      enabled: true
      secretName: room-gameplay-pgbouncer-tls
      clientMode: require
      serverMode: verify-full
    mesh:
      enforceStrictMTLS: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
