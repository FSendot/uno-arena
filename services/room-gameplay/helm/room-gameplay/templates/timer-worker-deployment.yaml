{{- /*
  Timer worker: same image as API; WORKER_ROLE=room-timer claims Redis timers
  and POSTs /internal/v1/rooms/{id}/timer-commands. Enabled for kind durable.
  It only drives deadlines and never publishes or operates either CDC pipeline.
*/ -}}
{{- if .Values.timerWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-timer-worker
  labels:
    app: {{ .Release.Name }}-timer-worker
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-timer-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-timer-worker
        app.kubernetes.io/name: room-gameplay
        app.kubernetes.io/part-of: {{ .Release.Name }}
        unoarena.io/component: room-timer-worker
        unoarena.io/metrics-scrape: pod
        unoarena.io/metrics-exposed: "true"
    spec:
      serviceAccountName: {{ .Release.Name }}-timer-worker
      automountServiceAccountToken: false
      containers:
        - name: timer-worker
          image: {{ include "room-gameplay.image" . | quote }}
          imagePullPolicy: {{ include "room-gameplay.imagePullPolicy" . }}
          ports:
            - name: metrics
              containerPort: 9090
          env:
            {{- include "room-gameplay.telemetryEnv" (dict "root" . "component" "room-timer-worker") | nindent 12 }}
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: DEPLOYMENT_ENV
              value: {{ .Values.env.DEPLOYMENT_ENV | default "" | quote }}
            - name: WORKER_ROLE
              value: "room-timer"
            - name: ROOM_GAMEPLAY_URL
              value: "http://{{ .Release.Name }}:8080"
            - name: REDIS_URL
              value: {{ .Values.env.REDIS_URL | quote }}
            {{- if .Values.existingSecret }}
            - name: ROOM_TIMER_SERVICE_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ .Values.secretEnv.ROOM_TIMER_SERVICE_CREDENTIAL | quote }}
            - name: ROOM_PGBOUNCER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ .Values.secretEnv.ROOM_PGBOUNCER_URL | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
