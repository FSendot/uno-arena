{{- /*
  BLOCKED: room-gameplay binary does not implement a WORKER_ROLE=room-timer loop,
  and production timer/Redis scheduling adapters are absent. Default/staging/production
  keep timerWorker.enabled=false so Helm does not launch a duplicate HTTP server.
*/ -}}
{{- if .Values.timerWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-timer-worker
  labels:
    app: {{ .Release.Name }}-timer-worker
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-timer-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-timer-worker
        app.kubernetes.io/part-of: {{ .Release.Name }}
    spec:
      containers:
        - name: timer-worker
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          env:
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: WORKER_ROLE
              value: "room-timer"
            - name: ROOM_GAMEPLAY_URL
              value: "http://{{ .Release.Name }}:8080"
            {{- if .Values.existingSecret }}
            - name: ROOM_TIMER_SERVICE_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | quote }}
                  key: {{ index .Values.secretEnv "ROOM_TIMER_SERVICE_CREDENTIAL" | quote }}
            - name: SERVICE_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | quote }}
                  key: {{ index .Values.secretEnv "SERVICE_CREDENTIAL" | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
