{{- /*
  Timer worker: same image as API; WORKER_ROLE=room-timer claims Redis timers
  and POSTs /internal/v1/rooms/{id}/timer-commands. Enabled for kind durable.
  Debezium Redis sink delivery remains PENDING — this worker only drives deadlines.
*/ -}}
{{- if .Values.timerWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-timer-worker
  labels:
    app: {{ .Release.Name }}-timer-worker
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-timer-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-timer-worker
        app.kubernetes.io/part-of: {{ .Release.Name }}
    spec:
      containers:
        - name: timer-worker
          image: {{ include "room-gameplay.image" . | quote }}
          imagePullPolicy: {{ include "room-gameplay.imagePullPolicy" . }}
          env:
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: DEPLOYMENT_ENV
              value: {{ .Values.env.DEPLOYMENT_ENV | default "" | quote }}
            - name: WORKER_ROLE
              value: "room-timer"
            - name: ROOM_GAMEPLAY_URL
              value: "http://{{ .Release.Name }}:8080"
            - name: REDIS_URL
              value: {{ .Values.env.REDIS_URL | quote }}
            - name: IDENTITY_URL
              value: {{ .Values.env.IDENTITY_URL | quote }}
            - name: GAME_INTEGRITY_URL
              value: {{ .Values.env.GAME_INTEGRITY_URL | quote }}
            {{- if .Values.existingSecret }}
            {{- range $envName, $key := .Values.secretEnv }}
            {{- /* Analytics backfill + public-list cursor HMAC secrets are API-only. */ -}}
            {{- if and $key (ne $key "") (ne $envName "ROOM_ANALYTICS_BACKFILL_CURSOR_SECRET") (ne $envName "ROOM_ANALYTICS_BACKFILL_SERVICE_CREDENTIAL") (ne $envName "ROOM_PUBLIC_LIST_CURSOR_SECRET") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
