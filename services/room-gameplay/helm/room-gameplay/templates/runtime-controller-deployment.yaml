{{- if .Values.topology.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-runtime-controller
  labels:
    app: {{ .Release.Name }}-runtime-controller
    unoarena.io/component: room-runtime-controller
spec:
  replicas: {{ .Values.topology.controller.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-runtime-controller
  template:
    metadata:
      annotations:
        unoarena.io/principal-key-version: {{ .Values.principalKeyVersion | quote }}
      labels:
        app: {{ .Release.Name }}-runtime-controller
        app.kubernetes.io/name: room-gameplay
        unoarena.io/component: room-runtime-controller
        unoarena.io/metrics-scrape: pod
        unoarena.io/metrics-exposed: "true"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: {{ .Release.Name }}-runtime-controller
      {{- end }}
      serviceAccountName: {{ .Release.Name }}-runtime-controller
      containers:
        - name: room-runtime-controller
          image: {{ include "room-gameplay.image" . | quote }}
          imagePullPolicy: {{ include "room-gameplay.imagePullPolicy" . }}
          ports:
            - name: metrics
              containerPort: 9090
          env:
            {{- include "room-gameplay.telemetryEnv" (dict "root" . "component" "room-runtime-controller") | nindent 12 }}
            - name: WORKER_ROLE
              value: "room-runtime-controller"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROOM_RUNTIME_IMAGE
              value: {{ include "room-gameplay.image" . | quote }}
            - name: ROOM_INTERNAL_PRINCIPAL_KEY_VERSION
              value: {{ .Values.principalKeyVersion | quote }}
            - name: ROOM_DB_POOL_MAX_CONNS
              value: {{ .Values.topology.controller.dbPoolMaxConns | quote }}
            - name: ROOM_RUNTIME_CONTROLLER_CLAIM_BATCH
              value: {{ .Values.topology.controller.claimBatch | quote }}
            - name: ROOM_RUNTIME_CONTROLLER_CONCURRENCY
              value: {{ .Values.topology.controller.concurrency | quote }}
            - name: ROOM_RUNTIME_READINESS_TIMEOUT_SECONDS
              value: {{ .Values.topology.controller.readinessTimeoutSeconds | quote }}
            - name: ROOM_RUNTIME_SECRET_NAME
              value: {{ .Values.existingSecret | quote }}
            - name: ROOM_RUNTIME_SECRET_ENV_JSON
              value: {{ .Values.runtimeSecretEnv | toJson | quote }}
            - name: ROOM_RUNTIME_MUTATION_QUEUE_CAPACITY
              value: {{ .Values.topology.runtime.mutationQueueCapacity | quote }}
            - name: ROOM_RUNTIME_CPU_REQUEST
              value: {{ .Values.topology.runtime.resources.requests.cpu | quote }}
            - name: ROOM_RUNTIME_MEMORY_REQUEST
              value: {{ .Values.topology.runtime.resources.requests.memory | quote }}
            - name: ROOM_RUNTIME_CPU_LIMIT
              value: {{ .Values.topology.runtime.resources.limits.cpu | quote }}
            - name: ROOM_RUNTIME_MEMORY_LIMIT
              value: {{ .Values.topology.runtime.resources.limits.memory | quote }}
            - name: ROOM_RUNTIME_PROBE_TIMEOUT_SECONDS
              value: {{ .Values.topology.runtime.healthProbes.timeoutSeconds | quote }}
            - name: ROOM_RUNTIME_PROBE_FAILURE_THRESHOLD
              value: {{ .Values.topology.runtime.healthProbes.failureThreshold | quote }}
            - name: ROOM_RUNTIME_NODE_SELECTOR_JSON
              value: {{ .Values.nodeSelector | toJson | quote }}
            - name: ROOM_RUNTIME_TOPOLOGY_SPREAD_ENABLED
              value: {{ .Values.topologySpread.enabled | quote }}
            - name: ROOM_RUNTIME_TOPOLOGY_KEY
              value: "kubernetes.io/hostname"
            - name: ROOM_RUNTIME_TOPOLOGY_MAX_SKEW
              value: {{ .Values.topologySpread.maxSkew | quote }}
            - name: ROOM_RUNTIME_TOPOLOGY_WHEN_UNSATISFIABLE
              value: {{ .Values.topologySpread.whenUnsatisfiable | quote }}
            {{- range $name, $val := .Values.env }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            {{- range $envName, $key := .Values.controllerSecretEnv }}
            {{- if and $key (ne $key "") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
