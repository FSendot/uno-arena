apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    unoarena.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        app.kubernetes.io/name: room-gameplay
        unoarena.io/component: api
        unoarena.io/metrics-exposed: "true"
    spec:
      serviceAccountName: {{ .Release.Name }}-router
      containers:
        - name: {{ .Release.Name }}
          image: {{ include "room-gameplay.image" . | quote }}
          imagePullPolicy: {{ include "room-gameplay.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            {{- include "room-gameplay.telemetryEnv" (dict "root" . "component" "room-router") | nindent 12 }}
            - name: WORKER_ROLE
              value: "room-router"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROOM_DB_POOL_MAX_CONNS
              value: "4"
            {{- range $name, $val := .Values.env }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            {{- range $envName, $key := .Values.secretEnv }}
            {{- if and $key (ne $key "") }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.existingSecret | quote }}
                  key: {{ $key | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: {{ .Values.healthProbes.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.timeoutSeconds }}
            failureThreshold: {{ .Values.healthProbes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
