test:room-gameplay:
  stage: test
  image: golang:1.22-alpine
  script:
    - cd services/room-gameplay/src && go vet ./... && go test ./...
  rules: &room_gameplay_validation_rules
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - services/room-gameplay/**
        - ci/templates/**
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/room-gameplay/**
        - ci/templates/**

build:room-gameplay:
  stage: build
  needs: ["test:room-gameplay"]
  script:
    - docker build -t $CI_REGISTRY_IMAGE/room-gameplay:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA services/room-gameplay/
  rules: *room_gameplay_validation_rules

deliver:room-gameplay:
  stage: deliver
  needs: ["build:room-gameplay"]
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/room-gameplay:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    - |
      CHART_VERSION=0.1.$CI_PIPELINE_IID
      helm package services/room-gameplay/helm/room-gameplay --version $CHART_VERSION --app-version $CI_COMMIT_SHORT_SHA
      curl --fail-with-body --request POST \
        --user gitlab-ci-token:$CI_JOB_TOKEN \
        --form "chart=@room-gameplay-$CHART_VERSION.tgz" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${CI_COMMIT_REF_SLUG}/charts"
  rules: &room_gameplay_main_push_rules
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - services/room-gameplay/**
        - ci/templates/**

deploy-staging:room-gameplay:
  stage: deploy-staging
  needs: ["deliver:room-gameplay"]
  when: manual
  script:
    - echo "deploy-staging for room-gameplay is stubbed for this checkpoint"
  rules: *room_gameplay_main_push_rules
