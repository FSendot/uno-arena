default:
  tags:
    - local-runner-sendot

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - plan
  - dispatch

variables:
  GIT_DEPTH: "0"
  # The local runner targets the long-lived simulator by default. Protected
  # pipelines may explicitly select production or both environments.
  DEPLOY_ENVIRONMENTS: "local-production"

plan:impact:
  stage: plan
  script:
    - ruby -Ici/lib ci/test/run.rb
    - ruby ci/bin/validate-inventories.rb --all
    - ruby ci/bin/generate-impact-pipeline.rb
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - generated/child-pipeline.yml
      - generated/impact.json

dispatch:impact:
  stage: dispatch
  inherit:
    default: false
  needs:
    - job: plan:impact
      artifacts: true
  trigger:
    include:
      - artifact: generated/child-pipeline.yml
        job: plan:impact
    strategy: depend
