spec:
  inputs:
    run_component:
      type: string
      description: "Release one component, or all components, through the local-production GitOps pipeline."
      default: all
      options:
        - all
        - analytics
        - game-integrity
        - gateway
        - identity
        - ranking
        - room-gameplay
        - spectator-view
        - tournament-orchestration
        - clickhouse
        - context-bootstrap
        - debezium-connect
        - debezium-server
        - kafka
        - keycloak
        - kurrentdb
        - local-retain-storage
        - minio
        - observability
        - platform-secrets
        - postgres-contexts
        - redis
---

default:
  tags:
    - local-runner-sendot

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - plan
  - dispatch

variables:
  GIT_DEPTH: "0"
  RUN_COMPONENT: "$[[ inputs.run_component ]]"
  # The local runner targets only the long-lived simulator. Production
  # selection remains fail-closed until its external preflight is executable.
  DEPLOY_ENVIRONMENTS: "local-production"

plan:impact:
  stage: plan
  script:
    - ruby -Ici/lib ci/test/run.rb
    - ruby ci/bin/validate-inventories.rb --all
    - ruby ci/bin/generate-impact-pipeline.rb
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - generated/child-pipeline.yml
      - generated/impact.json

dispatch:impact:
  stage: dispatch
  inherit:
    default: false
  needs:
    - job: plan:impact
      artifacts: true
  trigger:
    include:
      - artifact: generated/child-pipeline.yml
        job: plan:impact
    strategy: depend
