# Capability overlay for CLI / offline testing only.
# Uses real-service HTTP paths (GATEWAY_CAPABILITY_MODE / ROOM_CAPABILITY_MODE),
# not GATEWAY_ALLOW_FAKES / ROOM_ALLOW_FAKES backend fakes. Game Integrity stays
# on explicit memory (KURRENTDB_URL cleared + GAME_INTEGRITY_ALLOW_MEMORY).
#
# Capability mode intentionally does not need KurrentDB because GI uses explicit
# memory, so this overlay puts `kurrentdb` on a profile and clears game-integrity's
# dependency. The durable local/kind lane uses the native ARM64 KurrentDB image.
#
# Usage (config only / no pull):
#   docker compose -f docker-compose.local.yml -f docker-compose.capability.yml --env-file .env.example config
#
# Runtime (when intentionally testing capability mode):
#   docker compose -f docker-compose.local.yml -f docker-compose.capability.yml --env-file .env.example up
#
# Flags set here only:
#   GATEWAY_CAPABILITY_MODE     — real HTTP upstream clients + in-memory edge/principal limiters
#   ROOM_CAPABILITY_MODE        — memory session repo only; real HTTP Identity/GI/publisher paths
#   ANALYTICS_CAPABILITY_MODE   — memory Analytics store; durable ClickHouse URL cleared
#   GAME_INTEGRITY_ALLOW_MEMORY — offline memory stream repo
#   KURRENTDB_URL cleared       — required so GI uses memory instead of durable adapter

name: uno-arena-local

# Project-scoped edge + private network names so `docker compose -p <unique>`
# isolation works (base file pins fixed names for interactive local use).
networks:
  uno_edge:
    name: ${COMPOSE_PROJECT_NAME:-uno-arena-local}_edge
  uno_private:
    name: ${COMPOSE_PROJECT_NAME:-uno-arena-local}_private

services:
  # Omit from default capability selection because GI uses explicit memory.
  kurrentdb:
    profiles: ["architecture-kurrentdb"]

  gateway:
    environment:
      GATEWAY_CAPABILITY_MODE: "true"
      # Do not set GATEWAY_ALLOW_FAKES / ALLOW_FAKES here — those fake backends and
      # skip real Identity/Room/Tournament/Spectator/Ranking/Analytics HTTP paths.

  room-gameplay:
    environment:
      ROOM_CAPABILITY_MODE: "true"
      # Do not set ROOM_ALLOW_FAKES / ALLOW_FAKES here — those fake GI/session/audit
      # adapters and prevent the CLI from traversing real service HTTP paths.

  game-integrity:
    # Drop KurrentDB dependency so inactive profile does not break compose config.
    depends_on: !reset []
    environment:
      # Clear KurrentDB URL so resolveRuntime can select memory when allowed.
      KURRENTDB_URL: ""
      GAME_INTEGRITY_ALLOW_MEMORY: "true"
      # Capability lane is explicit memory; clear durable envelope provider/keyring.
      GAME_INTEGRITY_ENVELOPE_PROVIDER: ""
      GAME_INTEGRITY_ENVELOPE_DEV_KEYS: ""
      GAME_INTEGRITY_ENVELOPE_KEY_VERSION: ""
      DEPLOYMENT_ENV: test

  analytics:
    environment:
      ANALYTICS_CAPABILITY_MODE: "true"
      DEPLOYMENT_ENV: test
      # Clear durable ClickHouse so capability keeps the memory store.
      CLICKHOUSE_URL: ""
      CLICKHOUSE_USER: ""
      CLICKHOUSE_PASSWORD: ""
